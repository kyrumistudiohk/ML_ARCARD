<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 1. 確保所有容器都係透明，等相機畫面可以透出嚟 */
      html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background: transparent !important; 
      }
      
      /* 2. 相機鏡頭：置底並稍微放大解決黑邊 */
      video { 
        min-width: 100% !important; min-height: 100% !important; 
        object-fit: cover !important; 
        position: fixed !important; top: 50%; left: 50%;
        transform: translate(-50%, -50%) scale(1.1) !important;
        z-index: -2 !important; /* 最底層 */
        background: transparent !important;
      }

      /* 3. A-Frame 畫布：透明並擺喺相機上面 */
      .a-canvas { 
        background-color: transparent !important; 
        z-index: -1 !important; 
      }

      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* KYRUMI Loading Screen - 自動消失版 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 1s ease;
        pointer-events: none; /* 唔好阻住點擊 */
      }
      .loading-text {
        color: #d4af37; font-family: sans-serif; font-weight: bold; 
        letter-spacing: 6px; font-size: 18px;
      }

      /* REC 按鈕：右下角 */
      .controls { position: fixed; bottom: 40px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 75px; height: 75px; border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.8);
        background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0.6) 100%);
        color: #fff; font-weight: bold; font-size: 14px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        cursor: pointer;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

      /* 預覽彈窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 10000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      video#preview-video { width: 80%; border: 1px solid #d4af37; border-radius: 8px; }
      .popup-btns { display: flex; gap: 15px; margin-top: 25px; }
      .popup-btn { padding: 12px 25px; border-radius: 5px; font-weight: bold; text-decoration: none; font-size: 13px; cursor: pointer; }
      .save-btn { background: #d4af37; color: black; }
      .retry-btn { background: transparent; color: #fff; border: 1px solid #fff; }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="loading-text">KYRUMI STUDIO</div>
    </div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE VIDEO</a>
            <div id="retry-page" class="popup-btn retry-btn">RETRY</div>
        </div>
        <div id="close-preview" style="margin-top:25px; color:#666; cursor:pointer;">CLOSE</div>
    </div>

    <div class="controls">
      <div id="rec-btn">REC</div>
    </div>

    <!-- 
      autoStart 設為 true，並確保相機畫面透明 
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      embedded renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#cardVideo');
      const loadingScreen = document.getElementById('loading-screen');

      // 1. 自動隱藏 Loading Screen
      window.addEventListener("arReady", hideLoading);
      // 預防萬一：如果 3 秒後都未 arReady，強制隱藏
      setTimeout(hideLoading, 3000);

      function hideLoading() {
        if (loadingScreen.style.display !== 'none') {
          loadingScreen.style.opacity = '0';
          setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);
          // 嘗試解鎖影片播放
          video.play().then(() => video.pause());
        }
      }

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 2. 錄影功能
      let mediaRecorder, chunks = [], isRecording = false, interval;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";

            interval = setInterval(() => {
                const arCanvas = sceneEl.canvas;
                const videoFeed = document.querySelector('video:not(#cardVideo)');
                streamCanvas.width = arCanvas.width;
                streamCanvas.height = arCanvas.height;
                // 關鍵：繪製時確保背景唔係黑色
                sCtx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);
                if (videoFeed) sCtx.drawImage(videoFeed, 0, 0, streamCanvas.width, streamCanvas.height);
                sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
            }, 1000 / 30);

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('preview-video').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
                chunks = [];
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            clearInterval(interval);
            mediaRecorder.stop();
        }
      });

      document.getElementById('retry-page').addEventListener('click', () => { window.location.reload(); });
      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').pause();
      });

      // 解鎖聲音
      window.addEventListener('touchstart', () => { if (video.muted) video.muted = false; }, {once: true});
    </script>
  </body>
</html>
