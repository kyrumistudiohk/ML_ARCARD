<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基礎重設 */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; }
      
      /* 強制鏡頭全屏且置底 */
      video { 
        object-fit: cover !important; 
        width: 100vw !important; 
        height: 100vh !important; 
        position: fixed !important; 
        top: 0; left: 0; 
        z-index: -2 !important; 
      }

      /* A-Frame 容器強制透明，防止黑色區塊出現 */
      .a-canvas { background-color: transparent !important; z-index: -1 !important; }
      a-scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

      /* Loading Screen - 提高優先級 */
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #d4af37;
        border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* UI 控制項 */
      #ui-overlay { position: fixed; top: calc(env(safe-area-inset-top) + 20px); width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 50px; color: white; border: 1px solid #d4af37; font-size: 14px; }
      
      .controls { position: fixed; bottom: calc(env(safe-area-inset-bottom) + 40px); width: 100%; display: flex; justify-content: center; gap: 25px; z-index: 1000; }
      .btn { 
        width: 75px; height: 75px; border-radius: 50%; border: 3px solid #fff; 
        background: rgba(0,0,0,0.3); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 11px; backdrop-filter: blur(5px); text-align: center;
      }

      /* 截圖預覽 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-img { width: 80%; border: 1px solid #d4af37; margin-bottom: 20px; }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div class="spinner"></div>
      <div style="color:#d4af37; letter-spacing:3px;">KYRUMI STUDIO</div>
    </div>

    <div id="preview-layer">
        <div style="color:white; margin-bottom:10px;">長按儲存相片</div>
        <img id="preview-img" src="" />
        <div id="close-preview" style="color:#d4af37; padding:15px; cursor:pointer;">CLOSE</div>
    </div>

    <div id="ui-overlay"><div class="instruction">請對準卡片</div></div>

    <div class="controls">
      <div id="shot-btn" class="btn" style="border-color:#d4af37;">SHOT<br>截圖</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 加上 vr-mode-ui="enabled: false" 同埋修正 renderer -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      embedded
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; precision: medium;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls-enabled="false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 最終對位：修正 image_32 嘅位移 -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.44 0.01" 
               width="1.0" height="0.56" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const loader = document.getElementById('custom-loading');
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');

      // 確保 Loading Screen 喺 AR 準備好後消失
      window.addEventListener("arReady", () => {
        loader.style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 截圖邏輯
      document.querySelector('#shot-btn').addEventListener('click', () => {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');

        if (videoFeed) {
            // 計算鏡頭畫面喺 Canvas 比例，防止截圖拉伸
            ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        }
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        
        document.getElementById('preview-img').src = output.toDataURL('image/png');
        document.getElementById('preview-layer').style.display = 'flex';
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
      });

      // 錄影功能
      let mediaRecorder, chunks = [], isRecording = false, streamCanvas = document.createElement('canvas'), sCtx = streamCanvas.getContext('2d'), interval;

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          const stream = streamCanvas.captureStream(15);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = `KYRUMI_AR.webm`; a.click();
          };
          chunks = []; mediaRecorder.start();
          this.innerHTML = "STOP";
          interval = setInterval(() => {
            const arCanvas = document.querySelector('.a-canvas');
            const videoFeed = document.querySelector('video:not(#cardVideo)');
            streamCanvas.width = arCanvas.width; streamCanvas.height = arCanvas.height;
            if (videoFeed) sCtx.drawImage(videoFeed, 0, 0, streamCanvas.width, streamCanvas.height);
            sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
          }, 1000 / 15);
        } else {
          isRecording = false; clearInterval(interval); mediaRecorder.stop();
          this.innerHTML = "REC";
        }
      });

      window.addEventListener('touchstart', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
