<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機層 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -10 !important;
      }

      .a-canvas { background: transparent !important; z-index: -5 !important; }

      /* 自定義 Motion Sensor 彈窗設計 */
      #permission-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 30000;
        display: flex; align-items: center; justify-content: center;
      }
      .custom-popup {
        width: 85%; max-width: 320px; background: #1a1a1a; 
        border: 1px solid #d4af37; border-radius: 24px; padding: 40px 25px;
        text-align: center; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      }
      .custom-popup h2 { color: #d4af37; margin: 0 0 15px 0; letter-spacing: 2px; font-size: 22px; }
      .custom-popup p { font-size: 14px; line-height: 1.6; opacity: 0.8; margin-bottom: 30px; }
      
      #allow-btn { 
        background: linear-gradient(135deg, #d4af37 0%, #f2d479 100%);
        color: #000; padding: 16px; border-radius: 50px; 
        font-weight: 800; cursor: pointer; text-transform: uppercase;
        letter-spacing: 1px; transition: transform 0.2s;
      }
      #allow-btn:active { transform: scale(0.95); }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(5px);
        display: none; align-items: center; justify-content: center; z-index: 1000;
      }
      #rec-btn::after { content: ""; width: 25px; height: 25px; background: #ff4444; border-radius: 50%; transition: all 0.3s; }
      #rec-btn.recording::after { border-radius: 4px; transform: scale(0.8); }

      /* 錄製預覽窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.98); z-index: 40000; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 280px; height: 497px; background: #000; 
        border: 2px solid #d4af37; border-radius: 20px; object-fit: cover; 
      }

      .popup-btns { display: flex; gap: 15px; margin-top: 25px; width: 280px; }
      .btn { flex: 1; padding: 14px; border-radius: 50px; font-weight: bold; font-family: sans-serif; cursor: pointer; text-align: center; font-size: 14px; }
      .save { background: #d4af37; color: #000; text-decoration: none; }
      .close { border: 1px solid #fff; color: #fff; }

      #loading-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; font-family: sans-serif; display: none; z-index: 25000; }
    </style>
  </head>

  <body>
    <!-- 新設計的彈窗 -->
    <div id="permission-overlay">
      <div class="custom-popup">
        <h2>ENABLE AR</h2>
        <p>To experience the immersive effects, please allow access to your motion sensors.</p>
        <div id="allow-btn">Get Started</div>
      </div>
    </div>

    <div id="loading-text">INITIALIZING...</div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE VIDEO</a>
        </div>
    </div>

    <div id="rec-btn"></div>

    <!-- 注意：device-orientation-permission-ui="enabled: false" 用來關閉原生醜彈窗 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: false; precision: mediump;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const allowBtn = document.getElementById('allow-btn');
      const recBtn = document.getElementById('rec-btn');

      // 點擊新按鈕啟動
      allowBtn.addEventListener('click', async () => {
        document.getElementById('permission-overlay').style.display = 'none';
        document.getElementById('loading-text').style.display = 'block';

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error(e); }
        }
        sceneEl.systems['mindar-image-system'].start();
      });

      sceneEl.addEventListener("arReady", () => {
        document.getElementById('loading-text').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 錄影引擎 (已優化 Lag)
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.clientWidth) {
            captureCanvas.width = arCanvas.clientWidth;
            captureCanvas.height = arCanvas.clientHeight;
          }
          ctx.drawImage(videoFeed, 0, 0, captureCanvas.width, captureCanvas.height);
          ctx.drawImage(arCanvas, 0, 0, captureCanvas.width, captureCanvas.height);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          recBtn.classList.add('recording');
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          recBtn.classList.remove('recording');
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').onclick = () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      };

      // 自動全屏相機修復
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.width = '100vw'; v.style.height = '100vh';
          v.style.objectFit = 'cover'; v.style.zIndex = '-10';
        }
      }, 1000);
      
      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());
      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
