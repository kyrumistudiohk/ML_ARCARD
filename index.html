<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 強制全屏，防止分層 */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* A-Frame 容器修正 */
      a-scene {
        position: fixed !important;
        top: 0;
        left: 0;
        width: 100vw !important;
        height: 100vh !important;
        z-index: 1;
      }

      #loading-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: #d4af37; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.8s;
      }

      /* 介面浮動於最上層 */
      .capture-container {
        position: fixed; bottom: 40px; width: 100%; display: flex;
        justify-content: center; gap: 40px; align-items: center; z-index: 1000;
      }
      .btn {
        width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); cursor: pointer; display: flex;
        align-items: center; justify-content: center; color: white; font-size: 11px;
        font-weight: bold; text-align: center; pointer-events: auto;
      }
      #photo-btn { border-color: #d4af37; }
      #record-btn { border-color: #ff4444; }

      #ui {
        position: fixed; top: 30px; width: 100%; text-align: center; z-index: 999;
        color: white; pointer-events: none;
      }
      .instruction-box {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 8px 20px; border-radius: 50px; border: 1px solid #d4af37;
      }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div style="letter-spacing: 2px;">KYRUMI STUDIO</div>
      <div style="font-size: 10px; margin-top: 8px;">PREPARING AR...</div>
    </div>

    <div id="ui">
      <div class="instruction-box">
        <span style="font-size: 14px; font-weight: bold; display: block;">請對準卡片畫作</span>
        <span style="font-size: 9px; opacity: 0.8;">ALIGN WITH ARTWORK</span>
      </div>
    </div>

    <div class="capture-container">
      <div id="photo-btn" class="btn">SNAP<br>拍照</div>
      <div id="record-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 加入 embedded 確保聽從 CSS 排版 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;"
      embedded
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true, colorManagement: true, antialias: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           對位修正 (參考 Compiler 截圖)：
           Position Y: 0.28 (向上對準畫作)
           Width: 1.1 (完美覆蓋畫像寬度)
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.28 0" 
               width="1.1" height="0.62" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const photoBtn = document.querySelector('#photo-btn');

      window.addEventListener('load', () => {
        setTimeout(() => { 
          document.getElementById('loading-screen').style.opacity = '0'; 
          setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 800); 
        }, 1500);
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // --- 終極拍照修正：合併背景 + AR ---
      photoBtn.addEventListener('click', () => {
        const sceneEl = document.querySelector('a-scene');
        // 攞 MindAR 生成嘅鏡頭 Video 標籤
        const videoBack = document.querySelector('video:not(#cardVideo)');
        // 攞 AR 渲染嘅 Canvas
        const arCanvas = sceneEl.renderer.domElement;

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = arCanvas.offsetWidth;
        finalCanvas.height = arCanvas.offsetHeight;
        const ctx = finalCanvas.getContext('2d');

        // 1. 畫鏡頭背景 (處理比例填滿)
        ctx.drawImage(videoBack, 0, 0, finalCanvas.width, finalCanvas.height);
        
        // 2. 畫 AR 內容 (疊加)
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        const link = document.createElement('a');
        link.download = 'KYRUMI-AR-FULL.png';
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
