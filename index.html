<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 核心：確保所有層級都是透明的 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
      
      /* 強制相機：object-fit cover 解決黑邊 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: -5 !important; 
      }

      /* A-Frame 畫布透明化 */
      .a-canvas { background: transparent !important; z-index: -1 !important; }
      a-scene { background: transparent !important; }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; right: 30px; 
        width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); color: #fff; font-weight: bold;
        display: flex; align-items: center; justify-content: center; 
        z-index: 1000; font-family: sans-serif; cursor: pointer;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽窗修復：恢復為較小尺寸 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 2000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 220px; /* 恢復較小寬度 */
        height: 391px; /* 保持 9:16 比例 */
        background: #000; border: 2px solid #d4af37; border-radius: 10px; 
        object-fit: cover; 
      }

      /* 按鈕區 */
      .popup-btns { display: flex; gap: 15px; margin-top: 20px; }
      .btn { 
        padding: 10px 25px; border-radius: 20px; font-weight: bold; 
        font-family: sans-serif; text-decoration: none; cursor: pointer; font-size: 14px;
      }
      .save { background: #d4af37; color: #000; }
      .close { border: 1px solid #fff; color: #fff; }

      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; letter-spacing: 4px; }
    </style>
  </head>

  <body>
    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE</a>
        </div>
    </div>

    <div id="rec-btn">REC</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      embedded color-management="true" vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');

      // 強制修正相機比例
      setInterval(() => {
        const video = document.querySelector('video:not([id])');
        if (video) {
          video.style.setProperty('width', '100vw', 'important');
          video.style.setProperty('height', '100vh', 'important');
          video.style.setProperty('object-fit', 'cover', 'important');
          video.style.setProperty('z-index', '-5', 'important');
        }
      }, 1000);

      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 錄影邏輯
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d');

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          captureCanvas.width = arCanvas.width;
          captureCanvas.height = arCanvas.height;
          
          const vw = videoFeed.videoWidth;
          const vh = videoFeed.videoHeight;
          const cw = captureCanvas.width;
          const ch = captureCanvas.height;
          const vRatio = vw / vh;
          const cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) {
            sw = vh * cRatio; sh = vh;
            sx = (vw - sw) / 2; sy = 0;
          } else {
            sw = vw; sh = vw / cRatio;
            sx = 0; sy = (vh - sh) / 2;
          }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = "STOP";
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `AR_VIDEO.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = "REC";
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      // 觸摸即播放聲音，解決瀏覽器限制
      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
