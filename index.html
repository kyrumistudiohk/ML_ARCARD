<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 1. 確保背景透明，唔好遮住鏡頭 */
      html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background: transparent !important; 
      }

      /* 2. 強制相機畫面鋪滿底層 */
      video:not(#cardVideo):not(#preview-video) {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0; left: 0;
        z-index: -5 !important;
        display: block !important;
      }

      /* 3. A-Frame 畫布透明化 */
      .a-canvas { background: transparent !important; z-index: -1 !important; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* Loading 畫面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.8s; pointer-events: none;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 5px; }

      /* REC 按鈕 */
      .controls { position: fixed; bottom: 60px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 75px; height: 75px; border-radius: 50%;
        border: 4px solid #fff; background: rgba(0,0,0,0.3);
        color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: sans-serif; font-size: 14px;
        box-shadow: 0 0 15px rgba(0,0,0,0.5);
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; animation: blink 1s infinite; }
      @keyframes blink { 50% { opacity: 0.6; } }

      /* 預覽層：9:16 比例，無文字 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 10001; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }

      #preview-video { 
        width: 60%; /* 細預覽窗 */
        aspect-ratio: 9 / 16; 
        background: #000; border: 2px solid #d4af37; border-radius: 15px;
        object-fit: cover; margin-bottom: 40px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }

      .popup-btns { display: flex; gap: 20px; }
      .popup-btn { 
        padding: 12px 35px; border-radius: 30px; font-weight: bold; 
        text-decoration: none; font-size: 14px; font-family: sans-serif;
      }
      .save-btn { background: #d4af37; color: #000; }
      .close-btn { border: 1px solid #fff; color: #fff; }
    </style>
  </head>

  <body>
    <!-- 黑色墊底層（防閃爍） -->
    <div style="position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:-10;"></div>

    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="popup-btn close-btn">CLOSE</div>
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE</a>
        </div>
    </div>

    <div class="controls"><div id="rec-btn">REC</div></div>

    <!-- 確保 scene 也是透明的 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
      style="background: transparent;">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');

      window.addEventListener("arReady", () => {
        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          videoAsset.play().then(() => videoAsset.pause()); 
        }, 1500);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      let mediaRecorder, chunks = [], isRecording = false, interval;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";

            interval = setInterval(() => {
                const arCanvas = sceneEl.canvas;
                // 搵出 MindAR 個底層相機 Video (通常係冇 ID 嗰個)
                const videoFeed = document.querySelector('video:not([id])');
                if (!videoFeed) return;

                // 畫布跟隨螢幕解析度
                streamCanvas.width = arCanvas.width;
                streamCanvas.height = arCanvas.height;

                // 修正拉伸邏輯：Center Crop
                const vW = videoFeed.videoWidth;
                const vH = videoFeed.videoHeight;
                const cW = streamCanvas.width;
                const cH = streamCanvas.height;
                
                const vRatio = vW / vH;
                const cRatio = cW / cH;

                let sx, sy, sw, sh;
                if (vRatio > cRatio) {
                    sw = vH * cRatio; sh = vH;
                    sx = (vW - sw) / 2; sy = 0;
                } else {
                    sw = vW; sh = vW / cRatio;
                    sx = 0; sy = (vH - sh) / 2;
                }

                sCtx.clearRect(0, 0, cW, cH);
                // 1. 畫相機（防變形裁剪）
                sCtx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cW, cH);
                // 2. 畫 AR 內容
                sCtx.drawImage(arCanvas, 0, 0, cW, cH);
            }, 1000 / 30);

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); 
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('preview-video').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `AR_VIDEO.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
                chunks = [];
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            clearInterval(interval);
            mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if (videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
