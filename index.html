<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- 確保使用最新穩定版的 Mind-AR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 恢復 Mind-AR 預設的容器結構，唔好用固定高度 */
      body { margin: 0; overflow: hidden; background: #000; }
      
      /* 下方呢個設定係確保相機畫面可以正常比例顯示嘅唯一穩陣做法 */
      .mindar-ui-overlay { z-index: 100; }
      
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }

      .btn-container {
        position: fixed; bottom: 40px; width: 100%; display: flex;
        justify-content: center; gap: 20px; z-index: 1000;
      }
      .btn {
        width: 70px; height: 70px; border-radius: 50%; border: 2px solid white;
        background: rgba(0,0,0,0.5); color: white; display: flex; 
        align-items: center; justify-content: center; font-size: 12px;
      }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div style="color:#d4af37; margin-bottom:20px;">KYRUMI STUDIO</div>
      <div id="start-btn" style="padding:10px 20px; border:1px solid #d4af37; color:#d4af37; cursor:pointer;">
        點擊啟動 AR / CLICK TO START
      </div>
    </div>

    <div class="btn-container">
      <div id="shot-btn" class="btn" style="border-color:#d4af37;">SNAP</div>
      <div id="rec-btn" class="btn">REC</div>
    </div>

    <!-- 
      修正重點：
      1. 移除 embedded (有時會導致坐標偏移)
      2. 去除所有自定義的渲染器參數，先用最標準的
    -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- 
        Target 設置：
        如果圖片對唔準，請先將 position 設為 0 0 0，width 設為 1
        等佢「跟住」張卡行咗先，我哋再微調位移
      -->
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0 0" width="1" height="0.55" rotation="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startBtn = document.querySelector('#start-btn');
      const video = document.querySelector('#cardVideo');

      // 必須透過使用者點擊來啟動 Mind-AR，坐標先會準確
      startBtn.addEventListener('click', () => {
        const arSystem = sceneEl.systems["mindar-image-system"];
        arSystem.start(); 
        video.play();
        video.pause(); // 預熱影片
        document.querySelector('#custom-loading').style.display = 'none';
      });

      const targetEl = document.querySelector('#ar-target');
      
      // 監測是否偵測到卡片
      targetEl.addEventListener("targetFound", () => {
        console.log("偵測到卡片！影片應該會自動跳到卡片上面");
        video.play();
      });

      targetEl.addEventListener("targetLost", () => {
        video.pause();
      });

      // 截圖功能 (簡化版)
      document.querySelector('#shot-btn').addEventListener('click', () => {
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        const link = document.createElement('a');
        link.download = 'ar_capture.png';
        link.href = canvas.toDataURL();
        link.click();
      });
    </script>
  </body>
</html>
