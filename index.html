<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機層 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -5 !important;
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }

      /* Motion Sensor 權限請求 UI */
      #permission-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 20000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        text-align: center; color: #fff; font-family: sans-serif;
      }
      .permission-card { width: 80%; max-width: 300px; padding: 30px; border: 1px solid #d4af37; border-radius: 20px; }
      .permission-card h2 { color: #d4af37; margin-bottom: 15px; letter-spacing: 2px; }
      .permission-card p { font-size: 14px; line-height: 1.6; margin-bottom: 25px; opacity: 0.8; }
      #allow-btn { background: #d4af37; color: #000; padding: 12px 40px; border-radius: 30px; font-weight: bold; cursor: pointer; }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 35px; right: 25px; 
        width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff;
        background: rgba(0,0,0,0.4); color: #fff; font-weight: bold;
        display: flex; align-items: center; justify-content: center; 
        z-index: 1000; font-family: sans-serif; cursor: pointer;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); } }

      /* 預覽視窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10001; 
        display: none; flex-direction: column; align-items: center; 
        justify-content: flex-end; padding-bottom: 50px; 
      }
      #preview-video { 
        width: 250px; height: 444px; /* 調大後的比例 */
        background: #000; border: 2px solid #d4af37; border-radius: 15px; 
        object-fit: cover; margin-bottom: 30px;
      }

      .popup-btns { display: flex; gap: 20px; }
      .btn { padding: 12px 35px; border-radius: 25px; font-weight: bold; font-family: sans-serif; text-decoration: none; cursor: pointer; font-size: 14px; }
      .save { background: #d4af37; color: #000; }
      .close { border: 1px solid #fff; color: #fff; }

      #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
      .loading-text { color: #d4af37; font-family: sans-serif; letter-spacing: 4px; font-weight: bold; }
    </style>
  </head>

  <body>
    <!-- 更好的權限請求 UI -->
    <div id="permission-overlay">
      <div class="permission-card">
        <h2>ENABLE AR</h2>
        <p>We need motion sensor access to provide a stable AR experience.</p>
        <div id="allow-btn">START EXPERIENCE</div>
      </div>
    </div>

    <div id="loading-screen" style="display:none;"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE</a>
        </div>
    </div>

    <div id="rec-btn" style="display:none;">REC</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: true"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; precision: mediump;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');
      const allowBtn = document.getElementById('allow-btn');

      // 1. 處理權限與啟動
      allowBtn.addEventListener('click', () => {
        // 請求權限（iOS 必備）
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission()
            .then(response => {
              if (response == 'granted') startAR();
              else alert("Sensor access denied.");
            })
            .catch(console.error);
        } else {
          startAR(); // Android 或不支援請求的瀏覽器
        }
      });

      function startAR() {
        document.getElementById('permission-overlay').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        sceneEl.systems['mindar-image-system'].start(); // 手動啟動 MindAR
      }

      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 2. 自動鎖定相機樣式 (解決黑邊)
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('width', '100vw', 'important');
          v.style.setProperty('height', '100vh', 'important');
          v.style.setProperty('object-fit', 'cover', 'important');
          v.style.setProperty('z-index', '-5', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 3. 錄影引擎 (Anti-Lag 優化)
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.width) {
            captureCanvas.width = arCanvas.width;
            captureCanvas.height = arCanvas.height;
          }
          
          const cw = captureCanvas.width;
          const ch = captureCanvas.height;
          const vw = videoFeed.videoWidth;
          const vh = videoFeed.videoHeight;
          const vRatio = vw / vh;
          const cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) {
            sw = vh * cRatio; sh = vh;
            sx = (vw - sw) / 2; sy = 0;
          } else {
            sw = vw; sh = vw / cRatio;
            sx = 0; sy = (vh - sh) / 2;
          }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = "STOP";
          chunks = [];
          recordLoop();

          const stream = captureCanvas.captureStream(30); // 鎖定幀率
          mediaRecorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: 3000000 // 提升位元率保證畫質
          });
          
          mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR_${Date.now()}.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = "REC";
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
