<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機畫面修復：強制鋪滿全屏且不留白 */
      .mindar-ui-overlay ~ video { 
        width: 100vw !important; height: 100vh !important; 
        object-fit: cover !important; position: fixed !important; 
        top: 0; left: 0; z-index: -2 !important;
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* Loading 畫面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        transition: opacity 1s; pointer-events: none;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 5px; }

      /* REC 按鈕 */
      .controls { position: fixed; bottom: 50px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 70px; height: 70px; border-radius: 50%;
        border: 4px solid #fff; background: rgba(0,0,0,0.5);
        color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: sans-serif;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽視窗：手機比例 + 簡約化 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.85); z-index: 10001; display: none;
        flex-direction: column; align-items: center; justify-content: flex-end;
        padding-bottom: 80px;
      }

      /* 手機 9:16 比例視窗 */
      #preview-video { 
        width: 60%; /* 縮細預覽視窗 */
        aspect-ratio: 9 / 16; 
        background: #000; border: 2px solid #d4af37; border-radius: 15px;
        margin-bottom: 50px; /* 同掣之間嘅距離 */
        object-fit: cover;
      }

      .popup-btns { display: flex; gap: 20px; }
      .popup-btn { 
        padding: 12px 35px; border-radius: 30px; font-weight: bold; 
        text-decoration: none; font-size: 14px; font-family: sans-serif;
      }
      .save-btn { background: #d4af37; color: #000; }
      .close-btn { border: 1px solid #fff; color: #fff; }
    </style>
  </head>

  <body>
    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="popup-btn close-btn">CLOSE</div>
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE</a>
        </div>
    </div>

    <div class="controls"><div id="rec-btn">REC</div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#cardVideo');

      window.addEventListener("arReady", () => {
        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          video.play().then(() => video.pause()); 
        }, 1000);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => video.play());
      targetEl.addEventListener("targetLost", () => video.pause());

      let mediaRecorder, chunks = [], isRecording = false, interval;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";

            interval = setInterval(() => {
                const arCanvas = sceneEl.canvas;
                const videoFeed = document.querySelector('video:not(#cardVideo):not(#preview-video)');
                if (!videoFeed) return;

                streamCanvas.width = arCanvas.width;
                streamCanvas.height = arCanvas.height;

                // 核心：防止拉伸的繪製邏輯 (Cover 模式)
                const vWidth = videoFeed.videoWidth;
                const vHeight = videoFeed.videoHeight;
                const targetRatio = streamCanvas.width / streamCanvas.height;
                const sourceRatio = vWidth / vHeight;
                
                let drawW, drawH, offsetW, offsetH;
                if (sourceRatio > targetRatio) {
                    drawH = vHeight; drawW = vHeight * targetRatio;
                    offsetH = 0; offsetW = (vWidth - drawW) / 2;
                } else {
                    drawW = vWidth; drawH = vWidth / targetRatio;
                    offsetW = 0; offsetH = (vHeight - drawH) / 2;
                }

                sCtx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);
                sCtx.drawImage(videoFeed, offsetW, offsetH, drawW, drawH, 0, 0, streamCanvas.width, streamCanvas.height);
                sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
            }, 1000 / 30);

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); 
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('preview-video').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `AR_VIDEO.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
                chunks = [];
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            clearInterval(interval);
            mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if (video.muted) video.muted = false; }, {once: true});
    </script>
  </body>
</html>
