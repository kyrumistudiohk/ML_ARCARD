<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
      
      /* --- 強制 Loading Screen 優先顯示 --- */
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; /* 最高層級 */
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        transition: opacity 0.5s ease; /* 消失時有個動畫 */
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #d4af37;
        border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* --- 鏡頭與 AR 顯示 --- */
      video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; z-index: -1 !important; }
      .a-canvas { background: transparent !important; }

      #ui-overlay { position: fixed; top: 50px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.6); padding: 10px 22px; border-radius: 50px; color: white; border: 1px solid #d4af37; }
      
      .controls { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; }
      .btn { 
        width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; 
        background: rgba(0,0,0,0.3); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 12px; backdrop-filter: blur(4px); text-align: center;
      }

      /* --- 截圖預覽層 --- */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-img { width: 85%; border: 2px solid #d4af37; margin-bottom: 20px; }
    </style>
  </head>

  <body>
    <!-- Loading Screen 擺喺最前面 -->
    <div id="custom-loading">
      <div class="spinner"></div>
      <div style="color:#d4af37; letter-spacing:4px; font-weight:bold;">KYRUMI STUDIO</div>
      <div id="load-status" style="color:#666; font-size:10px; margin-top:10px;">Initializing AR...</div>
    </div>

    <div id="preview-layer">
        <div style="color:white; margin-bottom:15px; font-size: 14px;">長按圖片儲存 / Long Press to Save</div>
        <img id="preview-img" src="" />
        <div id="close-preview" style="color:#d4af37; padding:10px; cursor:pointer;">CLOSE 關閉</div>
    </div>

    <div id="ui-overlay"><div class="instruction">請對準卡片</div></div>

    <div class="controls">
      <div id="shot-btn" class="btn" style="border-color:#d4af37;">SHOT<br>截圖</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      embedded
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.44 0.01" 
               width="1.0" height="0.56">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const loader = document.getElementById('custom-loading');
      const statusText = document.getElementById('load-status');
      const video = document.querySelector('#cardVideo');

      // 監控 AR 狀態
      window.addEventListener("arReady", () => {
        statusText.innerText = "Ready!";
        setTimeout(() => {
          loader.style.opacity = '0';
          setTimeout(() => { loader.style.display = 'none'; }, 500);
        }, 1000);
      });

      // 監控 Error 預防死機
      window.addEventListener("error", (e) => {
        statusText.innerText = "Error loading. Please refresh.";
        console.error(e);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 截圖邏輯 (長按版本)
      document.querySelector('#shot-btn').addEventListener('click', () => {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');

        if (videoFeed) ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        
        document.getElementById('preview-img').src = output.toDataURL('image/png');
        document.getElementById('preview-layer').style.display = 'flex';
      });

      document.querySelector('#close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
      });

      // 簡單點擊取消靜音
      window.addEventListener('click', () => { video.muted = false; });
    </script>
  </body>
</html>
