<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基礎重設，確保畫布透明 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 關鍵：強制所有 video 標籤（包括 MindAR 生成的）置底且鋪滿 */
      video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 50% !important;
        left: 50% !important;
        transform: translate(-50%, -50%) !important;
        z-index: -2 !important;
      }

      /* A-Frame 畫布必須置於 video 之上且背景透明 */
      .a-canvas { z-index: -1 !important; background: transparent !important; }

      /* UI 介面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.5s;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 5px; }

      .controls { position: fixed; bottom: 50px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.3); color: #fff; font-weight: bold;
        display: flex; align-items: center; justify-content: center; font-family: sans-serif;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 15px #ff4444; }

      /* 9:16 預覽窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10001; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { width: 65%; aspect-ratio: 9/16; background: #000; border: 2px solid #d4af37; border-radius: 15px; object-fit: cover; }
      .popup-btns { display: flex; gap: 20px; margin-top: 20px; }
      .btn { padding: 12px 30px; border-radius: 20px; font-weight: bold; font-family: sans-serif; text-decoration: none; cursor: pointer; }
      .save { background: #d4af37; color: #000; }
      .close { border: 1px solid #fff; color: #fff; }
    </style>
  </head>

  <body>
    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE</a>
        </div>
    </div>

    <div class="controls"><div id="rec-btn">REC</div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      
      // 核心：每隔 500ms 強制修正一次 video 樣式，防止 MindAR 自動還原導致黑邊
      const fixVideo = () => {
        const videos = document.querySelectorAll('video:not(#cardVideo):not(#preview-video)');
        videos.forEach(v => {
          v.style.width = '100vw';
          v.style.height = '100vh';
          v.style.objectFit = 'cover';
        });
      };
      setInterval(fixVideo, 500);

      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.opacity = '0';
        setTimeout(() => document.getElementById('loading-screen').remove(), 500);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.width) {
            captureCanvas.width = arCanvas.width;
            captureCanvas.height = arCanvas.height;
          }
          const cw = captureCanvas.width;
          const ch = captureCanvas.height;
          
          // 計算相機裁剪 (Center Crop)
          const vw = videoFeed.videoWidth;
          const vh = videoFeed.videoHeight;
          const vRatio = vw / vh;
          const cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) {
            sw = vh * cRatio; sh = vh;
            sx = (vw - sw) / 2; sy = 0;
          } else {
            sw = vw; sh = vw / cRatio;
            sx = 0; sy = (vh - sh) / 2;
          }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      document.getElementById('rec-btn').addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = "STOP";
          chunks = [];
          recordLoop();

          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `AR_CAPTURE.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = "REC";
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('click', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
