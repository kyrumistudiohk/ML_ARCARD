<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
      
      #ui-overlay {
        position: fixed; top: 30px; width: 100%; text-align: center; z-index: 1000;
        pointer-events: none;
      }
      .instruction {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px; border-radius: 50px; border: 1.5px solid #d4af37; color: white;
      }

      .controls {
        position: fixed; bottom: 50px; width: 100%; display: flex;
        justify-content: center; gap: 40px; z-index: 1000;
      }
      .btn {
        width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.5); color: white; font-weight: bold;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; -webkit-tap-highlight-color: transparent; font-size: 12px;
      }
      #snap-btn { border-color: #d4af37; }
      #rec-btn { border-color: #ff4444; }

      .a-canvas {
        width: 100% !important; height: 100% !important;
        position: absolute !important; top: 0 !important; left: 0 !important;
      }

      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; color: #d4af37;
      }
    </style>
  </head>

  <body>
    <div id="loading">KYRUMI STUDIO Loading...</div>

    <div id="ui-overlay">
      <div class="instruction">
        <div style="font-size: 16px; font-weight: bold;">請對準卡片畫作</div>
        <div style="font-size: 10px; opacity: 0.8;">ALIGN WITH ARTWORK</div>
      </div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           修正對位（基於 image_14 實測）：
           Position Y: 降至 0.2
           Width: 縮至 0.95
           Height: 0.54 (維持 16:9 比例)
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.2 0" 
               width="0.95" height="0.54" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const snapBtn = document.querySelector('#snap-btn');

      window.addEventListener("load", () => {
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1500);
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // --- 強效拍照修正：保證抓取 AR 內容 ---
      snapBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const arCanvas = scene.renderer.domElement;
        const videoFeed = document.querySelector('video:not(#cardVideo)');

        if (!videoFeed) return;

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = arCanvas.width;
        finalCanvas.height = arCanvas.height;
        const ctx = finalCanvas.getContext('2d');

        // 1. 先畫背景鏡頭
        ctx.drawImage(videoFeed, 0, 0, finalCanvas.width, finalCanvas.height);
        
        // 2. 畫 AR 內容
        // 關鍵：直接用渲染器渲染一幀，確保 preserveDrawingBuffer 生效
        scene.renderer.render(scene.object3D, scene.camera);
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        // 3. 轉存成圖片
        const link = document.createElement('a');
        link.download = 'KYRUMI_AR_FIXED.png';
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
