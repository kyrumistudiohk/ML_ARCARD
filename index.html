<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; 
        background-color: transparent !important; 
      }
      
      /* 相機層置底 */
      video:not([id]) {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: -20 !important; 
      }

      .a-canvas { background: transparent !important; z-index: 1 !important; }

      /* REC 錄影按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; right: 30px; 
        width: 65px; height: 65px; border-radius: 50%; border: 1px solid #d4af37;
        background: rgba(13, 13, 13, 0.7); color: #d4af37;
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 1000; font-family: serif; cursor: pointer; transition: 0.3s;
      }
      #rec-btn .rec-text { font-size: 11px; font-weight: bold; }
      #rec-btn .sub-text { font-size: 8px; opacity: 0.8; }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 錄影預覽下載層 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 9999; display: none;
        flex-direction: column; align-items: center; justify-content: center;
        padding: 20px; box-sizing: border-box;
      }
      #preview-video { 
        max-width: 90%; max-height: 55vh; 
        border: 1px solid #d4af37; border-radius: 4px; background: #000;
        margin-bottom: 25px;
      }
      .popup-btns { display: flex; flex-direction: column; width: 85%; gap: 12px; }
      .btn { 
        padding: 15px; font-family: serif; cursor: pointer; font-size: 14px;
        letter-spacing: 2px; text-align: center; border-radius: 4px;
        text-decoration: none; border: 1px solid #d4af37;
      }
      .save { background: #d4af37; color: #000; font-weight: bold; }
      .close { background: transparent; color: #d4af37; }

      /* 啟動介面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0d0d0d; z-index: 10000; display: flex; align-items: center; justify-content: center;
      }
      .menu-card {
        padding: 40px 30px; border: 1px solid #d4af37; position: relative; text-align: center; width: 75%;
      }
      .menu-card::before { content: ""; position: absolute; top: -5px; left: -5px; width: 15px; height: 15px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .menu-card::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }
      .title { color: #d4af37; font-family: serif; letter-spacing: 5px; font-size: 24px; margin-bottom: 10px; }
      .desc { color: #d4af37; font-size: 11px; line-height: 1.8; opacity: 0.8; margin-bottom: 30px; }
      #start-btn {
        background: #d4af37; border: none; color: #000;
        padding: 14px 40px; font-size: 14px; letter-spacing: 2px; cursor: pointer;
        font-family: serif; font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="menu-card">
        <div class="title">KYRUMI STUDIO</div>
        <div class="desc">
          啟動 AR 需要使用您的相機與動態感測器<br>
          Camera and Motion Sensors access required.
        </div>
        <button id="start-btn">開始探索 / START</button>
      </div>
    </div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <a id="download-link" class="btn save">保存影片 / SAVE VIDEO</a>
            <div id="close-preview" class="btn close">重新返回 / BACK</div>
        </div>
    </div>

    <div id="rec-btn">
      <span class="rec-text">REC</span>
      <span class="sub-text">錄影</span>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 10; missTolerance: 15;"
      device-orientation-permission-ui="enabled: false"
      embedded color-management="true" vr-mode-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; precision: highp;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.08 0" width="0.86" height="0.50" transparent="false"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');
      const startBtn = document.getElementById('start-btn');

      // 啟動與權限
      startBtn.addEventListener('click', async () => {
        startBtn.innerText = "STARTING...";
        startBtn.disabled = true;

        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error("Sensor permission error:", e); }
        }

        sceneEl.systems['mindar-image-system'].start();
        videoAsset.load();
      });

      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
        document.body.style.backgroundColor = "transparent";
      });

      // 確保底層相機不被遮擋
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('z-index', '-20', 'important');
          v.style.setProperty('position', 'fixed', 'important');
          v.style.setProperty('background', 'transparent', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 錄影邏輯（高畫質、防變形、流暢特化版）
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d');

      let lastFrameTime = 0;
      const fpsInterval = 1000 / 30; // 鎖定穩定 30 FPS 錄製

      function recordLoop(timestamp) {
        if (!isRecording) return;
        requestAnimationFrame(recordLoop);

        // 限制幀率，防止手機發燙卡頓
        const elapsed = timestamp - lastFrameTime;
        if (elapsed < fpsInterval) return;
        lastFrameTime = timestamp - (elapsed % fpsInterval);

        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          // 【3. 解決模糊與擠壓變形關鍵】
          // 抓取真實手機畫布寬高，不再使用 640 低解析度限制，直接使用螢幕解析度
          const targetW = arCanvas.width;
          const targetH = arCanvas.height;

          if (captureCanvas.width !== targetW || captureCanvas.height !== targetH) {
            captureCanvas.width = targetW;
            captureCanvas.height = targetH;
          }

          // 清除上一幀
          ctx.clearRect(0, 0, targetW, targetH);

          // 相機背景畫面等比縮放繪製 (object-fit: cover 的 Canvas 實現，徹底避免擠壓變形)
          const imgW = videoFeed.videoWidth;
          const imgH = videoFeed.videoHeight;
          
          if (imgW > 0 && imgH > 0) {
            const scale = Math.max(targetW / imgW, targetH / imgH);
            const x = (targetW - imgW * scale) / 2;
            const y = (targetH - imgH * scale) / 2;
            ctx.drawImage(videoFeed, 0, 0, imgW, imgH, x, y, imgW * scale, imgH * scale);
          }

          // 完美無損重疊 3D AR 畫面 (AR Canvas 原生解析度)
          ctx.drawImage(arCanvas, 0, 0, targetW, targetH);
        }
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = '<span class="rec-text">STOP</span><span class="sub-text">停止</span>';
          chunks = [];
          
          lastFrameTime = performance.now();
          requestAnimationFrame(recordLoop);

          // 擷取 Canvas 串流 (30 FPS 錄製，保證流暢)
          const stream = captureCanvas.captureStream(30);
          
          // 使用 H264 編碼，此格式在 iOS / Android / PC 上皆能流暢播放，且檔案小、畫質極清晰
          let options = { mimeType: 'video/webm;codecs=vp9' };
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm;codecs=vp8' };
          }
          if (!MediaRecorder.isTypeSupported(options.mimeType)) {
            options = { mimeType: 'video/webm' };
          }
          
          mediaRecorder = new MediaRecorder(stream, { 
            mimeType: options.mimeType,
            videoBitsPerSecond: 3000000 // 提高碼率至 3Mbps，畫面細緻清晰！
          });
          
          mediaRecorder.ondataavailable = e => {
            if (e.data && e.data.size > 0) chunks.push(e.data);
          };

          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = '<span class="rec-text">REC</span><span class="sub-text">錄影</span>';
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
