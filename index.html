<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }
      
      /* UI 提示：維持簡單、不遮擋 */
      #ui-top {
        position: absolute; top: 30px; width: 100%; text-align: center; z-index: 1000;
        pointer-events: none;
      }
      .instruction-box {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 10px 20px; border-radius: 50px; border: 1.5px solid #d4af37; color: white;
      }

      /* 影相及錄影按鈕 */
      .controls {
        position: absolute; bottom: 40px; width: 100%; display: flex;
        justify-content: center; gap: 40px; z-index: 1000;
      }
      .circle-btn {
        width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); color: white; font-weight: bold;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; -webkit-tap-highlight-color: transparent; font-size: 11px;
      }
      #snap-btn { border-color: #d4af37; }
      #rec-btn { border-color: #ff4444; }

      #loading {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; align-items: center; justify-content: center; color: #d4af37;
      }
    </style>
  </head>

  <body>
    <div id="loading">KYRUMI STUDIO Loading...</div>

    <div id="ui-top">
      <div class="instruction-box">
        <div style="font-size: 15px; font-weight: bold;">請對準卡片畫作</div>
        <div style="font-size: 9px; opacity: 0.7; letter-spacing: 1px;">ALIGN WITH ARTWORK</div>
      </div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="circle-btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="circle-btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;"
      embedded color-space="sRGB" 
      renderer="preserveDrawingBuffer: true, alpha: true, antialias: true, colorManagement: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           根據 Compiler 截圖微調：
           Position Y: 0.28 (剛好對準畫作正中心)
           Width: 1.1 (配合畫作寬度)
           Height: 0.62 (配合畫作高度)
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.28 0" 
               width="1.1" height="0.62" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const snapBtn = document.querySelector('#snap-btn');

      window.addEventListener("load", () => {
        setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 1000);
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // --- 影相功能：合併「手機鏡頭背景」+「AR 內容」 ---
      snapBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const arCanvas = scene.renderer.domElement;
        const videoBack = document.querySelector('video:not(#cardVideo)');

        if (!videoBack) return;

        const finalCanvas = document.createElement('canvas');
        // 使用實時渲染嘅寬高
        finalCanvas.width = arCanvas.offsetWidth;
        finalCanvas.height = arCanvas.offsetHeight;
        const ctx = finalCanvas.getContext('2d');

        // 1. 先畫鏡頭背景 (按比例縮放以填滿 Canvas)
        const videoRatio = videoBack.videoWidth / videoBack.videoHeight;
        const canvasRatio = finalCanvas.width / finalCanvas.height;
        
        ctx.drawImage(videoBack, 0, 0, finalCanvas.width, finalCanvas.height);
        
        // 2. 再畫 AR 內容
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        // 3. 下載
        const link = document.createElement('a');
        link.download = 'KYRUMI_AR_PHOTO.png';
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      // 點擊畫面任何位置開啟聲音
      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
