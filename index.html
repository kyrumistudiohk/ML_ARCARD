<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; overflow: hidden; background: #000; }
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333;
        border-top: 4px solid #d4af37; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      
      #ui-overlay { position: fixed; top: 60px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white; font-family: sans-serif; }
      
      .controls { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
      .btn { 
        width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; 
        background: rgba(0,0,0,0.3); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);
        text-align: center; font-family: sans-serif;
      }
      #rec-btn.recording { background: rgba(255, 0, 0, 0.6); border-color: #ff4444; }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div class="spinner"></div>
      <div style="color:#d4af37; letter-spacing:4px;">KYRUMI STUDIO</div>
    </div>

    <div id="ui-overlay">
      <div class="instruction">請對準卡片上方畫作</div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      embedded color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 修正尺寸：根據 image_24，寬度要收窄至 0.8，位置稍微下移至 0.41 -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.41 0.01" 
               width="0.8" height="0.46" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const recBtn = document.querySelector('#rec-btn');
      
      window.addEventListener("arReady", () => {
        document.getElementById('custom-loading').style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 拍照與錄影共用的 Canvas 合成函數
      function captureCanvas() {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');
        
        if (videoFeed) {
          // 處理相機畫面比例
          const vRatio = videoFeed.videoWidth / videoFeed.videoHeight;
          const cRatio = output.width / output.height;
          let drawW, drawH, offX, offY;
          if (vRatio > cRatio) {
            drawH = output.height; drawW = drawH * vRatio;
            offX = (output.width - drawW) / 2; offY = 0;
          } else {
            drawW = output.width; drawH = drawW / vRatio;
            offX = 0; offY = (output.height - drawH) / 2;
          }
          ctx.drawImage(videoFeed, offX, offY, drawW, drawH);
        }
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        return output;
      }

      // 拍照 (修正 AR 消失問題)
      document.querySelector('#snap-btn').addEventListener('click', () => {
        const result = captureCanvas();
        const link = document.createElement('a');
        link.download = `KYRUMI_SNAP_${Date.now()}.png`;
        link.href = result.toDataURL('image/png');
        link.click();
      });

      // 錄影 (降低窒機感)
      let mediaRecorder;
      let chunks = [];
      let isRecording = false;
      let recordStreamCanvas = document.createElement('canvas');
      let rCtx = recordStreamCanvas.getContext('2d');
      let animFrame;

      function renderLoop() {
        if (!isRecording) return;
        const composed = captureCanvas();
        recordStreamCanvas.width = composed.width;
        recordStreamCanvas.height = composed.height;
        rCtx.drawImage(composed, 0, 0);
        animFrame = requestAnimationFrame(renderLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          const stream = recordStreamCanvas.captureStream(24); // 降至 24fps 增加穩定性
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `KYRUMI_REC.webm`;
            link.click();
          };
          chunks = [];
          mediaRecorder.start();
          recBtn.innerHTML = "STOP";
          recBtn.classList.add('recording');
          renderLoop();
        } else {
          isRecording = false;
          cancelAnimationFrame(animFrame);
          mediaRecorder.stop();
          recBtn.innerHTML = "REC";
          recBtn.classList.remove('recording');
        }
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
