<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      
      /* 強制隱藏所有 Mind-AR 預設 UI (掃描線等) */
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* 相機鏡頭底層 */
      video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; z-index: -1 !important; }

      /* UI 按鈕 */
      .controls { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 1000; }
      .btn { 
        width: 80px; height: 80px; border-radius: 50%; border: 2px solid #fff; 
        background: rgba(0,0,0,0.3); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);
        -webkit-tap-highlight-color: transparent;
      }
      #shot-btn { border-color: #d4af37; }

      /* 截圖預覽 (解決 Squeeze 問題) */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 2000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
    </style>
  </head>

  <body>
    <!-- 移除了 Click to Start 按鈕，直接加載 -->
    <div id="preview-layer">
        <div style="color:white; margin-bottom:15px;">長按儲存 / Long Press to Save</div>
        <img id="preview-img" style="max-width:85%; border:1px solid #d4af37;" />
        <div id="close-preview" style="color:#d4af37; margin-top:20px; padding:10px;">關閉 CLOSE</div>
    </div>

    <div class="controls">
      <div id="shot-btn" class="btn">SNAP</div>
      <div id="rec-btn" class="btn">REC</div>
    </div>

    <!-- 移除 embedded，讓 A-Frame 全屏渲染以修正追蹤坐標 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           對位修正：
           根據 image_35，影片向下拉咗。
           我哋將 Y 軸上移到 0.44，闊度 1.0，高度 0.56。
        -->
        <a-video id="video-obj" src="#cardVideo" 
               position="0 0.44 0" 
               width="1" height="0.56" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');

      // 自動啟動機制
      sceneEl.addEventListener("renderstart", () => {
        // 嘗試在載入時預熱影片
        video.play().then(() => video.pause());
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 修正後的截圖功能：解決 Squeeze 問題
      document.querySelector('#shot-btn').addEventListener('click', () => {
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        
        // 使用螢幕實際比例
        output.width = window.innerWidth * window.devicePixelRatio;
        output.height = window.innerHeight * window.devicePixelRatio;
        const ctx = output.getContext('2d');

        // 1. 先畫相機畫面 (Cover 模式)
        if (videoFeed) {
            const vWidth = videoFeed.videoWidth;
            const vHeight = videoFeed.videoHeight;
            const vRatio = vWidth / vHeight;
            const cRatio = output.width / output.height;
            let sx, sy, sw, sh;

            if (vRatio > cRatio) {
                sw = vHeight * cRatio;
                sh = vHeight;
                sx = (vWidth - sw) / 2;
                sy = 0;
            } else {
                sw = vWidth;
                sh = vWidth / cRatio;
                sx = 0;
                sy = (vHeight - sh) / 2;
            }
            ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, output.width, output.height);
        }

        // 2. 再畫 AR 內容 (疊加)
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        
        document.getElementById('preview-img').src = output.toDataURL('image/png');
        document.getElementById('preview-layer').style.display = 'flex';
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
      });

      // 錄影 (iOS 權限修復版)
      let mediaRecorder, chunks = [], isRecording = false;
      document.querySelector('#rec-btn').addEventListener('click', async function() {
        if (!isRecording) {
            const stream = arCanvas.captureStream(25);
            // 由於 iOS 錄影限制極多，若此按鈕仍不運作，建議使用 iPhone 內置螢幕錄影。
            // 這裡嘗試建立基礎錄影
            try {
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/mp4' });
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, { type: 'video/mp4' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url; a.download = 'AR_Video.mp4'; a.click();
                };
                chunks = []; mediaRecorder.start();
                isRecording = true; this.innerHTML = "STOP";
            } catch(e) { alert("錄影功能在此瀏覽器受限，請使用螢幕錄影。"); }
        } else {
            mediaRecorder.stop(); isRecording = false; this.innerHTML = "REC";
        }
      });

      // 點擊螢幕開啟聲音
      window.addEventListener('click', () => { video.muted = false; });
    </script>
  </body>
</html>
