<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 強制全屏，防止黑框出現 */
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 修正鏡頭比例，填滿全屏 */
      .mindar-ui-overlay { z-index: 500; }
      video { object-fit: cover !important; width: 100vw !important; height: 100vh !important; position: fixed !important; top: 0; left: 0; }

      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }

      #ui-overlay { position: fixed; top: 50px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 50px; border: 1px solid #d4af37; color: white; font-family: sans-serif; }
      
      .controls { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 25px; z-index: 1000; }
      .btn { 
        width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; 
        background: rgba(0,0,0,0.4); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);
        text-align: center; -webkit-tap-highlight-color: transparent;
      }
      #shot-btn { border-color: #d4af37; }
    </style>
  </head>

  <body>
    <div id="custom-loading"><div style="color:#d4af37;">LOADING...</div></div>

    <div id="ui-overlay"><div class="instruction">請對準卡片</div></div>

    <div class="controls">
      <div id="shot-btn" class="btn">SHOT<br>截圖</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 移除 embedded，讓 a-scene 自行處理全屏渲染 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 調整對位：寬度縮回 1.0，位置上移少少去 0.44 -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.44 0.01" 
               width="1.0" height="0.58" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const shotBtn = document.querySelector('#shot-btn');

      window.addEventListener("arReady", () => {
        document.getElementById('custom-loading').style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 截圖邏輯 (修復版)
      function takeScreenshot() {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');

        // 1. 畫背景相機
        if (videoFeed) {
          ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        }
        
        // 2. 畫 AR 內容
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        
        // 3. 觸發下載
        const link = document.createElement('a');
        link.download = `KYRUMI_SHOT.png`;
        link.href = output.toDataURL('image/png');
        link.click();
      }

      shotBtn.addEventListener('click', () => {
        takeScreenshot();
      });

      // 錄影邏輯 (保持穩定)
      let mediaRecorder, chunks = [], isRecording = false, streamCanvas = document.createElement('canvas'), sCtx = streamCanvas.getContext('2d'), interval;

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          const stream = streamCanvas.captureStream(15);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob); a.download = `KYRUMI_AR.webm`; a.click();
          };
          chunks = [];
          mediaRecorder.start();
          this.innerHTML = "STOP";
          interval = setInterval(() => {
            const arCanvas = document.querySelector('.a-canvas');
            const videoFeed = document.querySelector('video:not(#cardVideo)');
            streamCanvas.width = arCanvas.width;
            streamCanvas.height = arCanvas.height;
            if (videoFeed) sCtx.drawImage(videoFeed, 0, 0, streamCanvas.width, streamCanvas.height);
            sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
          }, 1000 / 15);
        } else {
          isRecording = false;
          clearInterval(interval);
          mediaRecorder.stop();
          this.innerHTML = "REC";
        }
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
