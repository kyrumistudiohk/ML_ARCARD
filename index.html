<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 確保背景透明，見到相機 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
      
      /* 修正全黑問題：將 Scene 容器設為絕對定位且背景透明 */
      #container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; }
      
      /* 黑色 Loading 畫面 */
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333;
        border-top: 4px solid #d4af37; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
      .loading-text { color: #d4af37; letter-spacing: 4px; font-size: 14px; font-weight: bold; }

      #ui-overlay { position: fixed; top: 60px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white; }
      
      .controls { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
      .btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; background: rgba(0,0,0,0.2); color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 13px; backdrop-filter: blur(5px); text-align:center; -webkit-tap-highlight-color: transparent; }
      #rec-btn.recording { background: rgba(255, 0, 0, 0.6); border-color: #ff4444; }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div class="spinner"></div>
      <div class="loading-text">KYRUMI STUDIO</div>
    </div>

    <div id="ui-overlay">
      <div class="instruction">
        <div style="font-size: 16px; font-weight: 700;">請對準卡片上方畫作</div>
      </div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <div id="container">
      <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no; filterMinCF:0.0001; filterBeta:0.001;"
        embedded color-space="sRGB" 
        renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; precision: medium;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">

        <a-assets>
          <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>

        <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
          <!-- 根據 image_23 調整：Y=0.45 應該最準確覆蓋上方畫作 -->
          <a-video id="video-display" src="#cardVideo" 
                 position="0 0.45 0" 
                 width="0.9" height="0.52" 
                 rotation="0 0 0">
          </a-video>
        </a-entity>
      </a-scene>
    </div>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const recBtn = document.querySelector('#rec-btn');
      
      // 當 AR 相機啟動後隱藏 Loading
      window.addEventListener("arReady", () => {
        document.getElementById('custom-loading').style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // --- 修復錄影背景黑屏 ---
      let mediaRecorder;
      let chunks = [];
      let isRecording = false;
      let animationId;
      const recordCanvas = document.createElement('canvas');
      const recordCtx = recordCanvas.getContext('2d');

      function drawComposite() {
        if (!isRecording) return;
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        
        if (videoFeed && arCanvas) {
            recordCanvas.width = arCanvas.width;
            recordCanvas.height = arCanvas.height;
            // 畫鏡頭
            recordCtx.drawImage(videoFeed, 0, 0, recordCanvas.width, recordCanvas.height);
            // 疊加 AR
            recordCtx.drawImage(arCanvas, 0, 0, recordCanvas.width, recordCanvas.height);
        }
        animationId = requestAnimationFrame(drawComposite);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          const stream = recordCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `KYRUMI_AR.webm`; a.click();
          };
          chunks = [];
          mediaRecorder.start();
          isRecording = true;
          recBtn.classList.add('recording');
          recBtn.innerHTML = "STOP";
          drawComposite();
        } else {
          isRecording = false;
          cancelAnimationFrame(animationId);
          mediaRecorder.stop();
          recBtn.classList.remove('recording');
          recBtn.innerHTML = "REC";
        }
      });

      // 拍照
      document.querySelector('#snap-btn').addEventListener('click', () => {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = arCanvas.width; finalCanvas.height = arCanvas.height;
        const ctx = finalCanvas.getContext('2d');
        ctx.drawImage(videoFeed, 0, 0, finalCanvas.width, finalCanvas.height);
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);
        const link = document.createElement('a');
        link.download = 'KYRUMI_SNAP.png'; link.href = finalCanvas.toDataURL(); link.click();
      });

      // 解除靜音
      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
