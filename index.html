<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; position: fixed; background: #000;
        font-family: -apple-system, sans-serif;
      }

      .a-canvas {
        width: 100vw !important; height: 100vh !important;
        position: fixed !important; top: 0 !important; left: 0 !important;
      }

      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a1a; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: #d4af37;
      }
      #loading .brand { font-size: 20px; letter-spacing: 4px; font-weight: bold; margin-bottom: 8px; }
      #loading .status { font-size: 10px; letter-spacing: 2px; opacity: 0.6; }

      #ui-overlay {
        position: fixed; top: 40px; width: 100%; text-align: center; z-index: 1000;
        pointer-events: none;
      }
      .instruction {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 10px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white;
      }

      .controls {
        position: fixed; bottom: 50px; width: 100%; display: flex;
        justify-content: center; gap: 40px; z-index: 1000;
      }
      .btn {
        width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); color: white; font-weight: bold;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; -webkit-tap-highlight-color: transparent; font-size: 12px;
        backdrop-filter: blur(5px); transition: all 0.2s;
      }
      #snap-btn { border-color: #d4af37; }
      #rec-btn { border-color: #ff4444; }
      .recording { background: rgba(255, 0, 0, 0.6) !important; transform: scale(1.1); }
    </style>
  </head>

  <body>
    <div id="loading">
      <div class="brand">KYRUMI STUDIO</div>
      <div class="status">Loading...</div>
    </div>

    <div id="ui-overlay">
      <div class="instruction">
        <div style="font-size: 16px; font-weight: 700;">請對準卡片上方畫作</div>
        <div style="font-size: 10px; opacity: 0.8;">ALIGN WITH UPPER ARTWORK</div>
      </div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; warmupSteps: 5; missTolerance: 30; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           修正重點：
           Position Y 設為 0.55，將影片推上卡片上半部的原畫位置。
           Width 0.95，填滿原畫框邊緣。
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.55 0" 
               width="0.95" height="0.54" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const snapBtn = document.querySelector('#snap-btn');
      const recBtn = document.querySelector('#rec-btn');

      window.addEventListener("load", () => {
        setTimeout(() => { 
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
        }, 2000);
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 拍照
      snapBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const arCanvas = scene.renderer.domElement;
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        if (!videoFeed) return;

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = arCanvas.width;
        finalCanvas.height = arCanvas.height;
        const ctx = finalCanvas.getContext('2d');

        const videoAspect = videoFeed.videoWidth / videoFeed.videoHeight;
        const canvasAspect = finalCanvas.width / finalCanvas.height;
        let dW, dH, oX, oY;

        if (videoAspect > canvasAspect) {
          dH = finalCanvas.height; dW = dH * videoAspect;
          oX = (finalCanvas.width - dW) / 2; oY = 0;
        } else {
          dW = finalCanvas.width; dH = dW / videoAspect;
          oX = 0; oY = (finalCanvas.height - dH) / 2;
        }

        ctx.drawImage(videoFeed, oX, oY, dW, dH);
        scene.renderer.render(scene.object3D, scene.camera);
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        const link = document.createElement('a');
        link.download = `KYRUMI_SNAP_${Date.now()}.png`;
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      // 錄影 (修正：錄影會擷取畫面並匯出)
      let mediaRecorder;
      let chunks = [];
      let isRecording = false;

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          const scene = document.querySelector('a-scene');
          const stream = scene.renderer.domElement.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `KYRUMI_REC_${Date.now()}.webm`;
            a.click();
          };
          chunks = [];
          mediaRecorder.start();
          isRecording = true;
          recBtn.classList.add('recording');
          recBtn.innerHTML = "STOP";
        } else {
          mediaRecorder.stop();
          isRecording = false;
          recBtn.classList.remove('recording');
          recBtn.innerHTML = "REC";
        }
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
