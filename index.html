<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 核心修正：強制讓相機 video 標籤顯示在最底層，唔好被黑屏遮住 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 強制鏡頭畫面顯示 */
      video { position: fixed !important; top: 0; left: 0; z-index: -1 !important; }

      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #d4af37; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      #ui-overlay { position: fixed; top: 60px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white; font-family: sans-serif; }
      
      .controls { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
      .btn { 
        width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; 
        background: rgba(0,0,0,0.2); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 13px; backdrop-filter: blur(5px);
        text-align: center; -webkit-tap-highlight-color: transparent;
      }
      #rec-btn.recording { background: rgba(255, 0, 0, 0.6); }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div class="spinner"></div>
      <div style="color:#d4af37; letter-spacing:4px; font-family:sans-serif;">KYRUMI STUDIO</div>
    </div>

    <div id="ui-overlay">
      <div class="instruction">請對準卡片上方畫作</div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 重新加入 embedded 並確保 renderer 設定正確 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      embedded
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 調整對位：寬度恢復到 0.9，位置 0.45 -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.45 0.01" 
               width="0.9" height="0.52" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const recBtn = document.querySelector('#rec-btn');
      
      window.addEventListener("arReady", () => {
        document.getElementById('custom-loading').style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 簡化合成函數，解決 Lag 同全黑問題
      function captureFrame() {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');
        
        if (videoFeed) {
          ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        }
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        return output;
      }

      // 拍照
      document.querySelector('#snap-btn').addEventListener('click', () => {
        const result = captureFrame();
        const link = document.createElement('a');
        link.download = `KYRUMI_SNAP.png`;
        link.href = result.toDataURL('image/png');
        link.click();
      });

      // 錄影 (採用 10fps 極低功耗模式，確保唔 Lag)
      let mediaRecorder;
      let chunks = [];
      let isRecording = false;
      let streamCanvas = document.createElement('canvas');
      let sCtx = streamCanvas.getContext('2d');
      let interval;

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          const stream = streamCanvas.captureStream(10); 
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `KYRUMI_AR.webm`;
            a.click();
          };
          chunks = [];
          mediaRecorder.start();
          recBtn.innerHTML = "STOP";
          recBtn.classList.add('recording');

          interval = setInterval(() => {
            const frame = captureFrame();
            streamCanvas.width = frame.width;
            streamCanvas.height = frame.height;
            sCtx.drawImage(frame, 0, 0);
          }, 100); // 100ms = 10fps

        } else {
          isRecording = false;
          clearInterval(interval);
          mediaRecorder.stop();
          recBtn.innerHTML = "REC";
          recBtn.classList.remove('recording');
        }
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
