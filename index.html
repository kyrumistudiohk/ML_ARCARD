<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 核心修正：鎖死網頁高度，防止因相機授權彈出導致佈局位移 */
      html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        overflow: hidden; position: fixed; background: #000;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      }

      /* 強制 A-Frame 畫布鋪滿全屏，不理會網址列變化 */
      .a-canvas {
        width: 100vw !important; height: 100vh !important;
        position: fixed !important; top: 0 !important; left: 0 !important;
      }

      /* Loading Screen 樣式修正 */
      #loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #1a1a1a; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center; color: #d4af37;
      }
      #loading .brand { font-size: 20px; letter-spacing: 4px; font-weight: bold; margin-bottom: 8px; }
      #loading .status { font-size: 10px; letter-spacing: 2px; opacity: 0.6; text-transform: uppercase; }

      #ui-overlay {
        position: fixed; top: 40px; width: 100%; text-align: center; z-index: 1000;
        pointer-events: none;
      }
      .instruction {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 10px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white;
      }

      .controls {
        position: fixed; bottom: 50px; width: 100%; display: flex;
        justify-content: center; gap: 40px; z-index: 1000;
      }
      .btn {
        width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); color: white; font-weight: bold;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        cursor: pointer; -webkit-tap-highlight-color: transparent; font-size: 12px;
        backdrop-filter: blur(5px);
      }
      #snap-btn { border-color: #d4af37; }
      #rec-btn { border-color: #ff4444; }
    </style>
  </head>

  <body>
    <!-- Loading Screen -->
    <div id="loading">
      <div class="brand">KYRUMI STUDIO</div>
      <div class="status">Loading...</div>
    </div>

    <div id="ui-overlay">
      <div class="instruction">
        <div style="font-size: 16px; font-weight: 700;">請對準卡片畫作</div>
        <div style="font-size: 10px; opacity: 0.8; letter-spacing: 1px;">ALIGN WITH ARTWORK</div>
      </div>
    </div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001; uiLoading: no; uiScanning: no;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           基於 image_17 & 18 最終對位修正：
           Width 0.85 確保不超出邊框
           Position Y 0.17 完美覆蓋原畫
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.17 0" 
               width="0.85" height="0.48" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const snapBtn = document.querySelector('#snap-btn');

      // 隱藏 Loading Screen
      window.addEventListener("load", () => {
        setTimeout(() => { 
          document.getElementById('loading').style.transition = 'opacity 0.5s';
          document.getElementById('loading').style.opacity = '0';
          setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 500);
        }, 2000);
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // --- 拍照功能：防止壓扁及比例失真 ---
      snapBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const arCanvas = scene.renderer.domElement;
        const videoFeed = document.querySelector('video:not(#cardVideo)');

        if (!videoFeed) return;

        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = arCanvas.width;
        finalCanvas.height = arCanvas.height;
        const ctx = finalCanvas.getContext('2d');

        // 計算相機畫面在 Canvas 上的 Cover 比例 (防止 Squeezed)
        const videoAspect = videoFeed.videoWidth / videoFeed.videoHeight;
        const canvasAspect = finalCanvas.width / finalCanvas.height;
        let drawWidth, drawHeight, offsetX, offsetY;

        if (videoAspect > canvasAspect) {
          drawHeight = finalCanvas.height;
          drawWidth = drawHeight * videoAspect;
          offsetX = (finalCanvas.width - drawWidth) / 2;
          offsetY = 0;
        } else {
          drawWidth = finalCanvas.width;
          drawHeight = drawWidth / videoAspect;
          offsetX = 0;
          offsetY = (finalCanvas.height - drawHeight) / 2;
        }

        // 1. 繪製相機底層
        ctx.drawImage(videoFeed, offsetX, offsetY, drawWidth, drawHeight);
        
        // 2. 疊加 AR 層
        scene.renderer.render(scene.object3D, scene.camera);
        ctx.drawImage(arCanvas, 0, 0, finalCanvas.width, finalCanvas.height);

        // 3. 下載
        const link = document.createElement('a');
        link.download = `KYRUMI_AR_${Date.now()}.png`;
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      // 觸摸解鎖聲音
      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
