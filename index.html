<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 全局基礎設定 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif", "Noto Serif JP", "MS Mincho"; }
      
      /* 相機層級修正：確保相機永遠在最底層 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -100 !important;
      }
      .a-canvas { background: transparent !important; z-index: -10 !important; }

      /* 日式藝術風格彈窗 */
      #permission-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0d0d0d; z-index: 50000;
        display: flex; align-items: center; justify-content: center;
      }
      .jp-card {
        width: 80%; max-width: 300px; padding: 40px 20px;
        border: 1px solid #d4af37; position: relative;
        text-align: center; color: #d4af37; background: #0d0d0d;
      }
      /* 四角日式飾線 */
      .jp-card::before { content: ""; position: absolute; top: -5px; left: -5px; width: 20px; height: 20px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .jp-card::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }

      .jp-card h1 { font-size: 20px; letter-spacing: 6px; margin: 0 0 10px 0; font-weight: 300; }
      .jp-card h2 { font-size: 12px; letter-spacing: 2px; margin-bottom: 30px; opacity: 0.8; }
      
      #start-btn { 
        display: inline-block; padding: 12px 30px; border: 1px solid #d4af37;
        color: #d4af37; font-size: 13px; letter-spacing: 3px; cursor: pointer;
        transition: all 0.3s; background: transparent;
      }
      #start-btn:active { background: #d4af37; color: #000; }

      /* 日式圓形錄影鍵 (像日本印章或家紋) */
      #rec-btn { 
        position: fixed; bottom: 45px; left: 50%; transform: translateX(-50%);
        width: 60px; height: 60px; border: 1px solid #d4af37; border-radius: 50%;
        display: none; align-items: center; justify-content: center; z-index: 1000;
        background: rgba(13, 13, 13, 0.6); backdrop-filter: blur(2px);
      }
      #rec-btn .inner-circle { width: 44px; height: 44px; background: #d4af37; border-radius: 50%; opacity: 0.8; }
      #rec-btn.recording .inner-circle { border-radius: 4px; background: #ff4444; transform: scale(0.6); }

      /* 藝術預覽窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 60000; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 280px; height: 500px; background: #000; 
        border: 1px solid #d4af37; object-fit: cover; 
      }

      .popup-btns { display: flex; gap: 0; margin-top: 20px; width: 280px; border: 1px solid #d4af37; }
      .btn { flex: 1; padding: 15px; font-size: 12px; letter-spacing: 2px; cursor: pointer; text-align: center; color: #d4af37; text-decoration: none; }
      .btn:first-child { border-right: 1px solid #d4af37; }
      .btn:active { background: #d4af37; color: #000; }

      #msg-loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #d4af37; letter-spacing: 4px; font-size: 12px; display: none; }
    </style>
  </head>

  <body>
    <!-- 日式藝術 UI -->
    <div id="permission-overlay">
      <div class="jp-card">
        <h1>KYRUMI STUDIO</h1>
        <h2>空間の記憶</h2>
        <div id="start-btn">進入啟動</div>
      </div>
    </div>

    <div id="msg-loading">。啟動中。</div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn">關閉 / CLOSE</div>
            <a id="download-link" class="btn">保存 / SAVE</a>
        </div>
    </div>

    <div id="rec-btn"><div class="inner-circle"></div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: false;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const startBtn = document.getElementById('start-btn');
      const recBtn = document.getElementById('rec-btn');

      // 啟動邏輯：解決黑屏與感應器問題
      startBtn.addEventListener('click', async () => {
        document.getElementById('permission-overlay').style.opacity = '0';
        setTimeout(() => { document.getElementById('permission-overlay').style.display = 'none'; }, 500);
        document.getElementById('msg-loading').style.display = 'block';

        // 1. 請求感應器 (Motion Sensor)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try { await DeviceOrientationEvent.requestPermission(); } catch (e) { console.error(e); }
        }

        // 2. 啟動 AR 系統
        sceneEl.systems['mindar-image-system'].start();
      });

      sceneEl.addEventListener("arReady", () => {
        document.getElementById('msg-loading').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 錄影引擎 (已針對流暢度優化)
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.clientWidth) {
            captureCanvas.width = arCanvas.clientWidth;
            captureCanvas.height = arCanvas.clientHeight;
          }
          ctx.drawImage(videoFeed, 0, 0, captureCanvas.width, captureCanvas.height);
          ctx.drawImage(arCanvas, 0, 0, captureCanvas.width, captureCanvas.height);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          recBtn.classList.add('recording');
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(25); // 降低些微幀率以確保錄影不 Lag
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond: 2500000 });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_STUDIO_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          recBtn.classList.remove('recording');
          mediaRecorder.stop();
        }
      });

      // 基礎事件與相機修正
      document.getElementById('close-preview').onclick = () => { document.getElementById('preview-layer').style.display = 'none'; };
      
      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 每秒檢測一次相機標籤，強制修正置底與黑屏
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('width', '100vw', 'important');
          v.style.setProperty('height', '100vh', 'important');
          v.style.setProperty('object-fit', 'cover', 'important');
          v.style.setProperty('z-index', '-100', 'important');
        }
      }, 1000);

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
