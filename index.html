<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基礎層級：確保一切透明，背景黑色僅作為緩衝 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機層：最高優先權置底 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -10 !important;
      }

      .a-canvas { background: transparent !important; z-index: -5 !important; }

      /* 啟動 UI */
      #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 30000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
      }
      .start-card { text-align: center; color: #fff; font-family: sans-serif; border: 1px solid #d4af37; padding: 40px 20px; border-radius: 20px; width: 80%; }
      #start-btn { 
        background: #d4af37; color: #000; padding: 15px 40px; 
        border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 20px;
        box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 35px; right: 25px; 
        width: 65px; height: 65px; border-radius: 50%; border: 3px solid #fff;
        background: rgba(0,0,0,0.4); color: #fff; font-weight: bold;
        display: none; align-items: center; justify-content: center; 
        z-index: 1000; font-family: sans-serif;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽窗 - 大小適中版 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 20000; 
        display: none; flex-direction: column; align-items: center; 
        justify-content: center;
      }
      #preview-video { 
        width: 260px; height: 462px; background: #000; 
        border: 2px solid #d4af37; border-radius: 15px; object-fit: cover; 
      }

      .popup-btns { display: flex; gap: 20px; margin-top: 30px; }
      .btn { padding: 12px 30px; border-radius: 25px; font-weight: bold; font-family: sans-serif; cursor: pointer; }
      .save { background: #d4af37; color: #000; text-decoration: none; }
      .close { border: 1px solid #fff; color: #fff; }

      #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 25000; display: none; align-items: center; justify-content: center; color: #d4af37; font-family: sans-serif; letter-spacing: 3px; }
    </style>
  </head>

  <body>
    <!-- 啟動與權限請求介面 -->
    <div id="start-overlay">
      <div class="start-card">
        <h2 style="color:#d4af37; letter-spacing:2px;">KYRUMI AR</h2>
        <p style="opacity:0.7; font-size:14px;">Allow camera and motion sensors to begin</p>
        <div id="start-btn">ENTER EXPERIENCE</div>
      </div>
    </div>

    <div id="loading-screen">LOADING...</div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE VIDEO</a>
        </div>
    </div>

    <div id="rec-btn">REC</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: false; precision: mediump;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const startBtn = document.getElementById('start-btn');
      const recBtn = document.getElementById('rec-btn');

      // 1. 核心啟動邏輯 (解決黑屏與不跳權限問題)
      startBtn.addEventListener('click', async () => {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';

        // 請求 iOS 動作感應權限
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error("Permission denied", e); }
        }

        // 啟動 AR
        sceneEl.systems['mindar-image-system'].start();
      });

      sceneEl.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 2. 錄影引擎優化 (解決 Lag)
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { alpha: false, desynchronized: true }); // 效能優化

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.clientWidth) {
            captureCanvas.width = arCanvas.clientWidth;
            captureCanvas.height = arCanvas.clientHeight;
          }
          
          // 繪製背景相機
          ctx.drawImage(videoFeed, 0, 0, captureCanvas.width, captureCanvas.height);
          // 繪製 AR 內容
          ctx.drawImage(arCanvas, 0, 0, captureCanvas.width, captureCanvas.height);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          recBtn.classList.add('recording');
          recBtn.innerText = "STOP";
          chunks = [];
          
          recordLoop();
          const stream = captureCanvas.captureStream(25); // 降低到 25fps 換取流暢度
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `AR_REC_${Date.now()}.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          recBtn.classList.remove('recording');
          recBtn.innerText = "REC";
          mediaRecorder.stop();
        }
      });

      // 3. 基礎事件
      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());
      document.getElementById('close-preview').onclick = () => {
        document.getElementById('preview-layer').style.display = 'none';
      };

      // 解決黑邊與自動播放
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.width = '100vw'; v.style.height = '100vh';
          v.style.objectFit = 'cover'; v.style.zIndex = '-10';
        }
      }, 1000);
      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
