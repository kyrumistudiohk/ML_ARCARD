<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; background: #000; }
      
      /* 強制鏡頭畫面顯示：重要！ */
      video { 
        object-fit: cover !important; 
        width: 100vw !important; 
        height: 100vh !important; 
        position: fixed !important; 
        top: 0; left: 0; 
        /* 先將 z-index 設高，確保睇到鏡頭，AR 載入後再由 JS 改低 */
        z-index: 0 !important; 
      }

      .a-canvas { background: transparent !important; }

      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 10000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }

      #ui-overlay { position: fixed; top: 60px; width: 100%; text-align: center; z-index: 2000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.6); padding: 12px 25px; border-radius: 50px; color: white; border: 1.5px solid #d4af37; font-family: sans-serif; letter-spacing: 1px; }
      
      .controls { position: fixed; bottom: 50px; width: 100%; display: flex; justify-content: center; gap: 30px; z-index: 2000; }
      .btn { 
        width: 85px; height: 85px; border-radius: 50%; border: 3px solid #fff; 
        background: rgba(0,0,0,0.2); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 13px; backdrop-filter: blur(8px); text-align: center;
      }
      #shot-btn { border-color: #d4af37; color: #d4af37; }

      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 20000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div style="color:#d4af37; font-family:sans-serif; letter-spacing:5px; font-weight:bold;">KYRUMI STUDIO</div>
      <div id="status" style="color:#444; font-size:12px; margin-top:15px;">STARTING CAMERA...</div>
    </div>

    <div id="preview-layer">
        <div style="color:white; margin-bottom:15px;">長按相片儲存 / Long Press to Save</div>
        <img id="preview-img" style="width:80%; border:2px solid #d4af37;" />
        <div id="close-preview" style="color:white; margin-top:20px; padding:10px 30px; background:#333; border-radius:5px;">CLOSE</div>
    </div>

    <div id="ui-overlay"><div class="instruction">請對準卡片上方畫作</div></div>

    <div class="controls">
      <div id="shot-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 移除 color-space (A-Frame 1.5.0 唔再需要)，增加 renderer 穩定性 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no; filterMinCF:0.0001; filterBeta: 0.001;"
      embedded
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0.01" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const loader = document.getElementById('custom-loading');
      const statusText = document.getElementById('status');
      const video = document.querySelector('#cardVideo');

      window.addEventListener("arReady", () => {
        statusText.innerText = "READY!";
        // 關鍵：等 AR 準備好，將鏡頭 video 推入底層，讓 AR Canvas 浮上來
        const cameraVideo = document.querySelector('video:not(#cardVideo)');
        if (cameraVideo) {
            cameraVideo.style.zIndex = "-1";
        }
        setTimeout(() => { loader.style.display = 'none'; }, 500);
      });

      // 監控相機權限報錯
      window.addEventListener("arError", () => {
        statusText.innerText = "Camera Error. Please check settings.";
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 拍照功能
      document.querySelector('#shot-btn').addEventListener('click', () => {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');
        if (videoFeed) ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        document.getElementById('preview-img').src = output.toDataURL('image/png');
        document.getElementById('preview-layer').style.display = 'flex';
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
      });

      // 點擊螢幕解開靜音 (iOS 限制)
      window.addEventListener('touchstart', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
