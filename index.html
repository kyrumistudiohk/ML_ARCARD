<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基礎設置 */
      html, body { 
        margin: 0; padding: 0; width: 100%; height: 100%; 
        overflow: hidden; background: #000; 
      }
      
      /* 相機畫面修復：解決黑屏，確保鋪滿 */
      video { 
        width: 100% !important; 
        height: 100% !important; 
        object-fit: cover !important; 
        position: absolute !important; 
        top: 0; left: 0;
        z-index: -2 !important; /* 置於最底層 */
        transform: scale(1.1); /* 消除黑邊 */
      }

      /* AR 畫布：必須透明 */
      .a-canvas { 
        background-color: transparent !important; 
        z-index: -1 !important; 
      }

      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* KYRUMI Loading Screen */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 1s ease; pointer-events: none; 
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 6px; font-size: 18px; }

      /* REC 按鈕 */
      .controls { position: fixed; bottom: 40px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 70px; height: 70px; border-radius: 50%;
        border: 4px solid rgba(255, 255, 255, 0.8);
        background: radial-gradient(circle, rgba(212, 175, 55, 0.2) 0%, rgba(0,0,0,0.6) 100%);
        color: #fff; font-weight: bold; font-size: 14px;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; animation: pulse 1.5s infinite; }
      @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

      /* 錄影預覽彈窗：重新定義高度同位置 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10001; /* 確保在最頂層 */
        display: none; flex-direction: column; align-items: center; 
        justify-content: space-around; /* 均勻分布元件 */
        padding: 40px 0;
        box-sizing: border-box;
      }

      /* 影片播放器：縮小至 45% 高度，確保不遮按鈕 */
      #preview-video { 
        width: 80%; 
        max-height: 45%; 
        border: 2px solid #d4af37; border-radius: 12px; 
        background: #000;
      }
      
      /* 按鈕容器 */
      .popup-btns { 
        display: flex; gap: 20px; width: 100%; 
        justify-content: center; align-items: center;
        margin-top: 10px;
      }
      .popup-btn { 
        padding: 14px 40px; border-radius: 50px; font-weight: bold; 
        text-decoration: none; font-size: 14px; cursor: pointer; 
        font-family: sans-serif; text-align: center;
      }
      .save-btn { background: #d4af37; color: black; border: none; }
      .close-btn { background: transparent; color: #fff; border: 1px solid #fff; }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="loading-text">KYRUMI STUDIO</div>
    </div>

    <!-- 錄影完成彈窗 -->
    <div id="preview-layer">
        <div style="color:#d4af37; letter-spacing:2px; font-weight:bold; font-size: 20px;">PREVIEW</div>
        
        <video id="preview-video" controls playsinline></video>
        
        <div class="popup-btns">
            <div id="close-preview" class="popup-btn close-btn">CLOSE</div>
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE</a>
        </div>
    </div>

    <div class="controls">
      <div id="rec-btn">REC</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const video = document.querySelector('#cardVideo');
      const loadingScreen = document.getElementById('loading-screen');

      // 自動淡出 Loading
      window.addEventListener("arReady", () => {
        setTimeout(() => {
          loadingScreen.style.opacity = '0';
          setTimeout(() => { loadingScreen.style.display = 'none'; }, 1000);
          video.play().then(() => video.pause()); 
        }, 1500);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 錄影邏輯
      let mediaRecorder, chunks = [], isRecording = false, interval;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";

            interval = setInterval(() => {
                const arCanvas = sceneEl.canvas;
                const videoFeed = document.querySelector('video:not(#cardVideo):not(#preview-video)');
                streamCanvas.width = arCanvas.width;
                streamCanvas.height = arCanvas.height;
                sCtx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);
                if (videoFeed) sCtx.drawImage(videoFeed, 0, 0, streamCanvas.width, streamCanvas.height);
                sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
            }, 1000 / 30);

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('preview-video').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `KYRUMI_AR_${Date.now()}.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
                chunks = [];
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            clearInterval(interval);
            mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').pause();
      });

      window.addEventListener('touchstart', () => { if (video.muted) video.muted = false; }, {once: true});
    </script>
  </body>
</html>
