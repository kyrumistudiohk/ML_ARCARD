<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機畫面修正：只針對 MindAR 生成的 video，不影響 A-Frame 渲染 */
      video[autoplay] {
        object-fit: cover !important;
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0; left: 0;
        z-index: -5 !important; /* 確保在最底層 */
      }

      .a-canvas { background: transparent !important; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* Loading Screen */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.8s; pointer-events: none;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 5px; }

      /* REC 按鈕 */
      .controls { position: fixed; bottom: 50px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 70px; height: 70px; border-radius: 50%;
        border: 4px solid #fff; background: rgba(0,0,0,0.4);
        color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: sans-serif; font-size: 14px;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽視窗：9:16 比例 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 10001; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }

      #preview-video { 
        width: 65%; /* 縮細預覽窗 */
        aspect-ratio: 9 / 16; 
        background: #111; border: 2px solid #d4af37; border-radius: 12px;
        object-fit: cover; margin-bottom: 40px;
      }

      .popup-btns { display: flex; gap: 25px; }
      .popup-btn { 
        padding: 12px 35px; border-radius: 30px; font-weight: bold; 
        text-decoration: none; font-size: 14px; font-family: sans-serif; text-align: center;
      }
      .save-btn { background: #d4af37; color: #000; border: none; }
      .close-btn { border: 1px solid #fff; color: #fff; background: transparent; }
    </style>
  </head>

  <body>
    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <!-- 刪除了 PREVIEW 文字 -->
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="popup-btn close-btn">CLOSE</div>
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE</a>
        </div>
    </div>

    <div class="controls"><div id="rec-btn">REC</div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');

      window.addEventListener("arReady", () => {
        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          videoAsset.play().then(() => videoAsset.pause()); 
        }, 1000);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      let mediaRecorder, chunks = [], isRecording = false, interval;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";

            interval = setInterval(() => {
                const arCanvas = sceneEl.canvas;
                // 搵出 MindAR 個底層相機 Video
                const videoFeed = document.querySelector('video[autoplay]:not(#cardVideo)');
                if (!videoFeed) return;

                streamCanvas.width = arCanvas.width;
                streamCanvas.height = arCanvas.height;

                // 核心：防止拉伸的計算 (Center Crop)
                const sW = videoFeed.videoWidth;
                const sH = videoFeed.videoHeight;
                const canvasRatio = streamCanvas.width / streamCanvas.height;
                const videoRatio = sW / sH;

                let sx, sy, sw, sh;
                if (videoRatio > canvasRatio) {
                    sw = sH * canvasRatio; sh = sH;
                    sx = (sW - sw) / 2; sy = 0;
                } else {
                    sw = sW; sh = sW / canvasRatio;
                    sx = 0; sy = (sH - sh) / 2;
                }

                sCtx.clearRect(0, 0, streamCanvas.width, streamCanvas.height);
                // 先畫相機畫面 (經裁剪防止變形)
                sCtx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, streamCanvas.width, streamCanvas.height);
                // 再畫 A-Frame AR 內容
                sCtx.drawImage(arCanvas, 0, 0, streamCanvas.width, streamCanvas.height);
            }, 1000 / 30);

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' }); 
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const preview = document.getElementById('preview-video');
                preview.src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `AR_RECOLLECTION.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
                chunks = [];
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            clearInterval(interval);
            mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      // 觸碰解除靜音
      window.addEventListener('touchstart', () => { if (videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
