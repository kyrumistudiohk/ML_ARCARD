<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 1. 解決右邊黑邊：強制相機鋪滿 */
      video[autoplay]:not(#cardVideo):not(#preview-video) {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0; left: 0;
        z-index: -2 !important;
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }
      .mindar-ui-overlay, .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

      /* Loading Screen */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center;
        transition: opacity 0.8s; pointer-events: none;
      }
      .loading-text { color: #d4af37; font-family: sans-serif; font-weight: bold; letter-spacing: 5px; }

      /* REC 按鈕 */
      .controls { position: fixed; bottom: 50px; right: 30px; z-index: 1000; }
      #rec-btn { 
        width: 75px; height: 75px; border-radius: 50%;
        border: 4px solid #fff; background: rgba(0,0,0,0.3);
        color: #fff; font-weight: bold; display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-family: sans-serif; font-size: 14px;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽窗：9:16 手機比例 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10001; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }

      #preview-video { 
        width: 60%; 
        aspect-ratio: 9 / 16; 
        background: #000; border: 2px solid #d4af37; border-radius: 12px;
        object-fit: cover; margin-bottom: 30px;
      }

      .popup-btns { display: flex; gap: 20px; }
      .popup-btn { 
        padding: 12px 35px; border-radius: 30px; font-weight: bold; 
        text-decoration: none; font-size: 14px; font-family: sans-serif;
      }
      .save-btn { background: #d4af37; color: #000; }
      .close-btn { border: 1px solid #fff; color: #fff; }
    </style>
  </head>

  <body>
    <div id="loading-screen"><div class="loading-text">KYRUMI STUDIO</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="popup-btn close-btn">CLOSE</div>
            <a id="download-link" class="popup-btn save-btn" href="#">SAVE</a>
        </div>
    </div>

    <div class="controls"><div id="rec-btn">REC</div></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: no; uiScanning: no;"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video id="video-obj" src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');

      window.addEventListener("arReady", () => {
        setTimeout(() => {
          document.getElementById('loading-screen').style.opacity = '0';
          videoAsset.play().then(() => videoAsset.pause()); 
        }, 1500);
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      let mediaRecorder, chunks = [], isRecording = false, animationFrameId;
      const streamCanvas = document.createElement('canvas');
      const sCtx = streamCanvas.getContext('2d');

      function recordFrame() {
        if (!isRecording) return;

        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video[autoplay]:not(#cardVideo):not(#preview-video)');
        
        if (videoFeed && arCanvas) {
            // 錄影畫布大小對齊螢幕
            streamCanvas.width = window.innerWidth * window.devicePixelRatio;
            streamCanvas.height = window.innerHeight * window.devicePixelRatio;

            const cW = streamCanvas.width;
            const cH = streamCanvas.height;

            // 1. 相機 Center Crop 邏輯
            const vW = videoFeed.videoWidth;
            const vH = videoFeed.videoHeight;
            const vRatio = vW / vH;
            const cRatio = cW / cH;

            let sx, sy, sw, sh;
            if (vRatio > cRatio) {
                sw = vH * cRatio; sh = vH;
                sx = (vW - sw) / 2; sy = 0;
            } else {
                sw = vW; sh = vW / cRatio;
                sx = 0; sy = (vH - sh) / 2;
            }

            sCtx.clearRect(0, 0, cW, cH);
            // 繪製相機
            sCtx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cW, cH);
            // 繪製 AR 內容 (AR 畫布本身就是螢幕比例，直接鋪滿)
            sCtx.drawImage(arCanvas, 0, 0, cW, cH);
        }
        animationFrameId = requestAnimationFrame(recordFrame);
      }

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
            isRecording = true;
            this.classList.add('recording');
            this.innerHTML = "STOP";
            
            chunks = [];
            recordFrame();

            const stream = streamCanvas.captureStream(30);
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                document.getElementById('preview-video').src = url;
                document.getElementById('download-link').href = url;
                document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
                document.getElementById('preview-layer').style.display = 'flex';
            };
            mediaRecorder.start();
        } else {
            isRecording = false;
            this.classList.remove('recording');
            this.innerHTML = "REC";
            cancelAnimationFrame(animationFrameId);
            mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if (videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
