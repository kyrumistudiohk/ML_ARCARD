<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基本重置 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 強制相機層置底且可見 */
      video:not([id]) {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: -10 !important; 
      }

      .a-canvas { background: transparent !important; }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 50px; right: 30px; 
        width: 70px; height: 70px; border-radius: 50%; border: 1px solid #d4af37;
        background: rgba(13, 13, 13, 0.8); color: #d4af37;
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 1000; font-family: serif; 
        cursor: pointer; transition: 0.3s;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }
      #rec-btn span { pointer-events: none; }

      /* 錄影預覽層：解決太大與按鈕重疊問題 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 99999; display: none;
        flex-direction: column; align-items: center; justify-content: flex-start;
        padding-top: 60px;
      }
      #preview-video { 
        width: 70%; max-height: 50vh; /* 縮小影片高度 */
        background: #000; border: 1px solid #d4af37; border-radius: 4px; 
        object-fit: contain;
      }
      .popup-btns { 
        display: flex; flex-direction: column; width: 70%; gap: 15px; margin-top: 30px; 
      }
      .btn { 
        padding: 16px; font-family: serif; cursor: pointer; font-size: 14px;
        letter-spacing: 2px; text-align: center; border: 1px solid #d4af37; border-radius: 4px;
        text-decoration: none;
      }
      .save { background: #d4af37; color: #000; font-weight: bold; }
      .close { background: transparent; color: #d4af37; }

      /* 啟動選單 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0d0d0d; z-index: 999999; display: flex; align-items: center; justify-content: center;
      }
      .menu-card {
        padding: 50px 30px; border: 1px solid #d4af37; position: relative; text-align: center; width: 70%;
      }
      .menu-card::before { content: ""; position: absolute; top: -5px; left: -5px; width: 15px; height: 15px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .menu-card::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }
      
      .title { color: #d4af37; font-family: serif; letter-spacing: 4px; font-size: 22px; margin-bottom: 15px; }
      .desc { color: #d4af37; font-size: 11px; line-height: 1.6; opacity: 0.8; margin-bottom: 35px; }

      #start-btn {
        background: #d4af37; border: none; color: #000;
        padding: 14px 40px; font-size: 14px; letter-spacing: 2px; cursor: pointer;
        font-family: serif; font-weight: bold;
      }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="menu-card">
        <div class="title">KYRUMI STUDIO</div>
        <div class="desc">
          點擊下方按鈕以啟動相機 AR 體驗<br>
          Click below to start the Camera AR experience.
        </div>
        <button id="start-btn">開始體驗 / START</button>
      </div>
    </div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <a id="download-link" class="btn save">保存影片 / SAVE VIDEO</a>
            <div id="close-preview" class="btn close">返回 / BACK</div>
        </div>
    </div>

    <div id="rec-btn">
      <span style="font-size: 12px; font-weight: bold;">REC</span>
      <span style="font-size: 9px; opacity: 0.8;">錄影</span>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      device-orientation-permission-ui="enabled: false"
      embedded color-management="true" vr-mode-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0 0" width="1" height="0.56" transparent="false"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');
      const startBtn = document.getElementById('start-btn');

      // 點擊後僅會觸發「相機」授權，因為動態感測器已被禁用
      startBtn.addEventListener('click', () => {
        startBtn.innerText = "STARTING...";
        // 啟動 AR
        sceneEl.systems['mindar-image-system'].start();
        videoAsset.load();
      });

      // 當 AR 準備好時
      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
        // 額外確保 canvas 透明，防止黑屏
        document.querySelector('.a-canvas').style.background = 'transparent';
      });

      // 每秒強制檢查背景相機視訊，防止黑屏
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('z-index', '-10', 'important');
          v.style.setProperty('background', 'transparent', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 錄影功能
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d');

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          captureCanvas.width = arCanvas.width;
          captureCanvas.height = arCanvas.height;
          const vw = videoFeed.videoWidth, vh = videoFeed.videoHeight;
          const cw = captureCanvas.width, ch = captureCanvas.height;
          const vRatio = vw / vh, cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) { sw = vh * cRatio; sh = vh; sx = (vw - sw) / 2; sy = 0; }
          else { sw = vw; sh = vw / cRatio; sx = 0; sy = (vh - sh) / 2; }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = '<span style="font-size:12px;font-weight:bold;">STOP</span><span style="font-size:9px;opacity:0.8;">停止</span>';
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = '<span style="font-size:12px;font-weight:bold;">REC</span><span style="font-size:9px;opacity:0.8;">錄影</span>';
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
