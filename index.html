<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 全局基礎與防黑屏設定 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: "serif", "Noto Serif JP", "Times New Roman"; }
      
      /* 相機層：強制置底並保持透明度 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -100 !important;
      }

      .a-canvas { background: transparent !important; z-index: -5 !important; }

      /* 日系極簡藝術 UI (Kyrumi Studio 專屬) */
      #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 50000;
        display: flex; align-items: center; justify-content: center;
      }
      .jp-card {
        width: 80%; max-width: 300px; padding: 50px 20px;
        border: 1px solid #d4af37; position: relative;
        text-align: center; color: #d4af37;
      }
      /* 和風飾邊 */
      .jp-card::before { content: ""; position: absolute; top: -4px; left: -4px; width: 15px; height: 15px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .jp-card::after { content: ""; position: absolute; bottom: -4px; right: -4px; width: 15px; height: 15px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }

      .jp-card h1 { font-size: 22px; letter-spacing: 5px; margin: 0; font-weight: 300; }
      .jp-card h2 { font-size: 11px; letter-spacing: 2px; margin-top: 5px; opacity: 0.7; font-weight: normal; }
      .jp-card p { font-size: 13px; margin: 30px 0; opacity: 0.8; line-height: 1.8; }
      
      #start-btn { 
        display: inline-block; padding: 12px 35px; border: 1px solid #d4af37;
        color: #d4af37; font-size: 13px; letter-spacing: 4px; cursor: pointer;
        transition: 0.3s; background: transparent;
      }
      #start-btn:active { background: #d4af37; color: #000; }

      /* 日印式錄影按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 65px; height: 65px; border-radius: 50%; border: 1px solid #d4af37;
        background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; 
        z-index: 1000; color: #d4af37; font-size: 10px; letter-spacing: 1px;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 藝術預覽窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 60000; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 280px; height: 497px; background: #000; 
        border: 1px solid #d4af37; border-radius: 10px; object-fit: cover; 
      }

      .popup-btns { display: flex; gap: 0; margin-top: 25px; width: 280px; border: 1px solid #d4af37; }
      .btn { flex: 1; padding: 15px; font-size: 12px; letter-spacing: 1px; cursor: pointer; text-align: center; color: #d4af37; text-decoration: none; }
      .btn:first-child { border-right: 1px solid #d4af37; }

      #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 55000; display: none; align-items: center; justify-content: center; color: #d4af37; letter-spacing: 5px; font-size: 12px; }
    </style>
  </head>

  <body>
    <!-- 日系 UI 層 -->
    <div id="start-overlay">
      <div class="jp-card">
        <h1>KYRUMI STUDIO</h1>
        <h2>空間の記憶 | MEMORY OF SPACE</h2>
        <p>請允許開啟相機與感應器<br>Please allow access to camera and sensors</p>
        <div id="start-btn">啟動 / START</div>
      </div>
    </div>

    <div id="loading-screen">引導中... / LOADING...</div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn">關閉 / CLOSE</div>
            <a id="download-link" class="btn">保存 / SAVE</a>
        </div>
    </div>

    <div id="rec-btn">REC</div>

    <!-- 加入了 device-orientation-permission-ui="enabled: false" 以防止自動彈窗衝突 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: false; precision: mediump;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const startBtn = document.getElementById('start-btn');
      const recBtn = document.getElementById('rec-btn');

      // 修復：手動順序觸發，確保不黑屏
      startBtn.addEventListener('click', async () => {
        document.getElementById('start-overlay').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';

        // 1. 請求感應器權限 (iOS 必要)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error("Permission denied", e); }
        }

        // 2. 啟動 AR 系統
        sceneEl.systems['mindar-image-system'].start();
      });

      sceneEl.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 錄影優化
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { alpha: false, desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.clientWidth) {
            captureCanvas.width = arCanvas.clientWidth;
            captureCanvas.height = arCanvas.clientHeight;
          }
          ctx.drawImage(videoFeed, 0, 0, captureCanvas.width, captureCanvas.height);
          ctx.drawImage(arCanvas, 0, 0, captureCanvas.width, captureCanvas.height);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          recBtn.classList.add('recording');
          recBtn.innerText = "STOP";
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(25);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          recBtn.classList.remove('recording');
          recBtn.innerText = "REC";
          mediaRecorder.stop();
        }
      });

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());
      document.getElementById('close-preview').onclick = () => {
        document.getElementById('preview-layer').style.display = 'none';
      };

      // 強制相機背景修復週期
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('width', '100vw', 'important');
          v.style.setProperty('height', '100vh', 'important');
          v.style.setProperty('object-fit', 'cover', 'important');
          v.style.setProperty('z-index', '-100', 'important');
        }
      }, 1000);

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
