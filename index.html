<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 確保 Body 同 Scene 係透明/全屏 */
      body { margin: 0; overflow: hidden; background: #000; }
      
      #custom-loading {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; z-index: 2000; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
      }
      .spinner {
        width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #d4af37; border-radius: 50%;
        animation: spin 1s linear infinite; margin-bottom: 20px;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      #ui-overlay { position: fixed; top: 60px; width: 100%; text-align: center; z-index: 1000; pointer-events: none; }
      .instruction { display: inline-block; background: rgba(0,0,0,0.7); padding: 12px 24px; border-radius: 50px; border: 1.5px solid #d4af37; color: white; font-family: sans-serif; }
      
      .controls { position: fixed; bottom: 80px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 1000; }
      .btn { 
        width: 80px; height: 80px; border-radius: 50%; border: 3px solid #fff; 
        background: rgba(0,0,0,0.4); color: white; font-weight: bold; 
        display: flex; align-items: center; justify-content: center; 
        cursor: pointer; font-size: 12px; backdrop-filter: blur(5px);
        text-align: center; -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>

  <body>
    <div id="custom-loading">
      <div class="spinner"></div>
      <div style="color:#d4af37; letter-spacing:4px; font-family:sans-serif;">KYRUMI STUDIO</div>
    </div>

    <div id="ui-overlay"><div class="instruction">請對準卡片上方畫作</div></div>

    <div class="controls">
      <div id="snap-btn" class="btn">SNAP<br>拍照</div>
      <div id="rec-btn" class="btn">REC<br>錄影</div>
    </div>

    <!-- 移除 embedded，讓 A-Frame 自行接管全屏，避免 iOS 黑屏 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; uiLoading: no; uiScanning: no;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;" 
      vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 最終對位微調：寬度 0.9，高度 0.52，位置 0.45 -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.45 0" 
               width="0.9" height="0.52" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      
      window.addEventListener("arReady", () => {
        document.getElementById('custom-loading').style.display = 'none';
      });

      targetEl.addEventListener("targetFound", () => { video.play(); });
      targetEl.addEventListener("targetLost", () => { video.pause(); });

      // 合成函數
      function getCapturedCanvas() {
        const arCanvas = document.querySelector('.a-canvas');
        const videoFeed = document.querySelector('video:not(#cardVideo)');
        const output = document.createElement('canvas');
        output.width = arCanvas.width;
        output.height = arCanvas.height;
        const ctx = output.getContext('2d');
        if (videoFeed) ctx.drawImage(videoFeed, 0, 0, output.width, output.height);
        ctx.drawImage(arCanvas, 0, 0, output.width, output.height);
        return output;
      }

      // 拍照
      document.querySelector('#snap-btn').addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = `KYRUMI_SNAP.png`;
        link.href = getCapturedCanvas().toDataURL('image/png');
        link.click();
      });

      // 錄影 (低 FPS 穩定版)
      let mediaRecorder, chunks = [], isRecording = false, streamCanvas = document.createElement('canvas'), sCtx = streamCanvas.getContext('2d'), interval;

      document.querySelector('#rec-btn').addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          const stream = streamCanvas.captureStream(12);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/webm' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `KYRUMI_AR.webm`;
            a.click();
          };
          chunks = [];
          mediaRecorder.start();
          this.innerHTML = "STOP";
          interval = setInterval(() => {
            const frame = getCapturedCanvas();
            streamCanvas.width = frame.width;
            streamCanvas.height = frame.height;
            sCtx.drawImage(frame, 0, 0);
          }, 1000 / 12);
        } else {
          isRecording = false;
          clearInterval(interval);
          mediaRecorder.stop();
          this.innerHTML = "REC";
        }
      });

      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
