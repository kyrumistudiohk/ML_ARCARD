<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000 !important; }
      
      /* 相機層穩定設定 */
      video:not([id]) {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: -5 !important; 
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }

      /* REC 按鈕樣式 (中英) */
      #rec-btn { 
        position: fixed; bottom: 50px; right: 30px; 
        width: 70px; height: 70px; border-radius: 50%; border: 1px solid #d4af37;
        background: rgba(13, 13, 13, 0.8); color: #d4af37;
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 1000; font-family: "serif", "Noto Serif TC", serif; 
        cursor: pointer; transition: all 0.3s;
      }
      #rec-btn .rec-text { font-size: 12px; font-weight: bold; letter-spacing: 1px; }
      #rec-btn .sub-text { font-size: 9px; margin-top: 2px; opacity: 0.8; }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; }

      /* 預覽視窗優化 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 2000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        max-width: 80%; max-height: 60vh; 
        background: #000; border: 1px solid #d4af37; border-radius: 4px; 
      }
      .popup-btns { 
        display: flex; flex-direction: column; width: 80%; gap: 10px; margin-top: 20px; 
      }
      .btn { 
        padding: 15px; font-family: "serif", serif; cursor: pointer; font-size: 14px;
        letter-spacing: 2px; text-align: center; border: 1px solid #d4af37; border-radius: 4px;
      }
      .save { background: #d4af37; color: #000; font-weight: bold; text-decoration: none; }
      .close { background: transparent; color: #d4af37; }

      /* 主選單啟動畫面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0d0d0d; z-index: 9999; display: flex; align-items: center; justify-content: center;
      }
      .menu-card {
        padding: 60px 30px; border: 1px solid #d4af37; position: relative; text-align: center; width: 75%;
      }
      .menu-card::before { content: ""; position: absolute; top: -5px; left: -5px; width: 15px; height: 15px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .menu-card::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }
      
      .title { color: #d4af37; font-family: "serif", serif; letter-spacing: 4px; font-size: 24px; margin-bottom: 15px; }
      .desc { color: #d4af37; font-size: 12px; line-height: 1.8; opacity: 0.8; font-family: "serif", serif; margin-bottom: 40px; }

      #start-btn {
        background: transparent; border: 1px solid #d4af37; color: #d4af37;
        padding: 12px 40px; font-size: 14px; letter-spacing: 2px; cursor: pointer;
        font-family: "serif", serif; transition: 0.3s;
      }
      #start-btn:active { background: #d4af37; color: #000; }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div class="menu-card">
        <div class="title">KYRUMI STUDIO</div>
        <div class="desc">
          此體驗需要獲取您的相機與動態感測器權限<br>
          Camera and Motion Sensor access are required.
        </div>
        <button id="start-btn">點擊開始 / START</button>
      </div>
    </div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <a id="download-link" class="btn save">保存影片 / SAVE VIDEO</a>
            <div id="close-preview" class="btn close">返回 / BACK</div>
        </div>
    </div>

    <div id="rec-btn">
      <span class="rec-text">REC</span>
      <span class="sub-text">錄影</span>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded color-management="true" vr-mode-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0 0" width="1" height="0.56" transparent="false"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');
      const startBtn = document.getElementById('start-btn');

      // 合併權限與啟動邏輯
      startBtn.addEventListener('click', async () => {
        startBtn.innerText = "LOADING...";
        startBtn.disabled = true;

        // 1. 同步請求 iOS 感測器權限 (必須在 Click 事件第一時間執行)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error(e); }
        }

        // 2. 啟動 AR (觸發相機請求)
        sceneEl.systems['mindar-image-system'].start();
        videoAsset.load();
      });

      window.addEventListener("arReady", () => {
        const loader = document.getElementById('loading-screen');
        loader.style.opacity = "0";
        setTimeout(() => { 
          loader.style.display = 'none'; 
          recBtn.style.display = 'flex'; 
        }, 500);
      });

      // 防止畫面黑屏的背景強制邏輯
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v && v.style.zIndex !== '-5') {
          v.style.setProperty('width', '100vw', 'important');
          v.style.setProperty('height', '100vh', 'important');
          v.style.setProperty('object-fit', 'cover', 'important');
          v.style.setProperty('z-index', '-5', 'important');
          v.style.setProperty('position', 'fixed', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 錄影邏輯與畫布混合
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d');

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          captureCanvas.width = arCanvas.width;
          captureCanvas.height = arCanvas.height;
          const vw = videoFeed.videoWidth, vh = videoFeed.videoHeight;
          const cw = captureCanvas.width, ch = captureCanvas.height;
          const vRatio = vw / vh, cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) { sw = vh * cRatio; sh = vh; sx = (vw - sw) / 2; sy = 0; }
          else { sw = vw; sh = vw / cRatio; sx = 0; sy = (vh - sh) / 2; }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = '<span class="rec-text">STOP</span><span class="sub-text">停止</span>';
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = '<span class="rec-text">REC</span><span class="sub-text">錄影</span>';
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
