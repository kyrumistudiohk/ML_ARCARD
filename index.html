<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: -apple-system, sans-serif; }
      
      /* 功能 1: 載入畫面 */
      #loading-screen {
        position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: #d4af37; display: flex; flex-direction: column;
        align-items: center; justify-content: center; z-index: 2000; transition: opacity 0.8s;
      }

      /* 功能 2: 拍照及錄影按鈕 (加大間距，避免遮擋) */
      .capture-container {
        position: absolute; bottom: 40px; width: 100%; display: flex;
        justify-content: space-around; align-items: center; z-index: 1000;
      }
      .btn {
        width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.5); cursor: pointer; display: flex;
        align-items: center; justify-content: center; color: white; font-size: 11px;
        font-weight: bold; text-align: center; pointer-events: auto;
      }
      #photo-btn { border-color: #d4af37; }
      #record-btn { border-color: #ff4444; }

      /* UI 提示 */
      #ui {
        position: absolute; top: 20px; width: 100%; text-align: center; z-index: 999;
        color: white; pointer-events: none; transition: 0.5s;
      }
      .instruction-box {
        display: inline-block; background: rgba(0, 0, 0, 0.7);
        padding: 8px 20px; border-radius: 50px; border: 1px solid #d4af37;
      }

      /* 功能 4: 狀態提示 */
      #status-msg {
        position: absolute; bottom: 130px; width: 100%; text-align: center;
        color: #ff4444; font-size: 12px; z-index: 999; display: none;
      }

      .hidden { display: none !important; }
    </style>
  </head>

  <body>
    <div id="loading-screen">
      <div style="letter-spacing: 2px;">KYRUMI STUDIO</div>
      <div style="font-size: 10px; margin-top: 8px;">PREPARING AR...</div>
    </div>

    <div id="ui">
      <div class="instruction-box">
        <span style="font-size: 14px; font-weight: bold; display: block;">請對準卡片全貌</span>
        <span style="font-size: 9px; opacity: 0.8;">ALIGN CAMERA WITH CARD</span>
      </div>
    </div>

    <div id="status-msg">環境太暗或距離太近 | TOO DARK OR TOO CLOSE</div>

    <div class="capture-container">
      <div id="photo-btn" class="btn">SNAP<br>拍照</div>
      <div id="record-btn" class="btn">REC<br>錄影</div>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0005; filterBeta: 0.1;"
      color-space="sRGB" 
      renderer="preserveDrawingBuffer: true, colorManagement: true, antialias: true" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">

      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" preload="auto" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <!-- 
           修正對位：
           Position Y: 降至 0.13 (避免太高)
           Width: 縮至 0.82 (配合原圖比例)
           Height: 0.46
        -->
        <a-video id="video-display" src="#cardVideo" 
               position="0 0.13 0" 
               width="0.82" height="0.46" 
               rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#cardVideo');
      const targetEl = document.querySelector('#ar-target');
      const loadingScreen = document.querySelector('#loading-screen');
      const photoBtn = document.querySelector('#photo-btn');

      window.addEventListener('load', () => {
        setTimeout(() => { loadingScreen.style.opacity = '0'; 
        setTimeout(() => { loadingScreen.style.display = 'none'; }, 800); }, 1000);
      });

      targetEl.addEventListener("targetFound", () => { 
        video.play(); 
        document.querySelector('#status-msg').style.display = 'none';
      });
      targetEl.addEventListener("targetLost", () => { 
        video.pause(); 
        setTimeout(() => { if (video.paused) document.querySelector('#status-msg').style.display = 'block'; }, 3000);
      });

      // --- 修正版拍照功能 (合併鏡頭背景) ---
      photoBtn.addEventListener('click', () => {
        const sceneEl = document.querySelector('a-scene');
        const videoEl = document.querySelector('video'); // 呢個係相機鏡頭嘅 Video Tag
        const canvas = sceneEl.components.screenshot.getCanvas('perspective');
        
        // 建立一個臨時的 Canvas 嚟合併兩者
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = canvas.width;
        finalCanvas.height = canvas.height;
        const ctx = finalCanvas.getContext('2d');

        // 1. 先畫鏡頭畫面
        ctx.drawImage(videoEl, 0, 0, finalCanvas.width, finalCanvas.height);
        // 2. 再畫 AR 內容
        ctx.drawImage(canvas, 0, 0, finalCanvas.width, finalCanvas.height);

        const link = document.createElement('a');
        link.download = 'KYRUMI-AR-Capture.png';
        link.href = finalCanvas.toDataURL('image/png');
        link.click();
      });

      // 錄影功能限制較多，通常 Web 端無法簡單合併背景錄影，
      // 建議先用拍照功能測試背景合併是否成功。
      window.addEventListener('click', () => { if (video.muted) video.muted = false; });
    </script>
  </body>
</html>
