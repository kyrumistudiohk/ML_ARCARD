<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 核心變數 */
      :root {
        --navy: #000C1F;
        --gold: #D4AF37;
        --gold-light: #F2D479;
      }

      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機層強制置底 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -10 !important;
      }

      .a-canvas { background: transparent !important; z-index: -5 !important; }

      /* 品牌啟動彈窗 (Kyrumi Studio Style) */
      #permission-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--navy); z-index: 30000;
        display: flex; align-items: center; justify-content: center;
      }
      .custom-popup {
        width: 85%; max-width: 340px; background: rgba(255, 255, 255, 0.03); 
        border: 1.5px solid var(--gold); border-radius: 30px; padding: 45px 30px;
        text-align: center; color: #fff; font-family: "Helvetica Neue", sans-serif;
        box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        backdrop-filter: blur(10px);
      }
      .brand-title { 
        font-size: 12px; color: var(--gold); letter-spacing: 6px; 
        margin-bottom: 8px; text-transform: uppercase; font-weight: 300;
      }
      .main-title { 
        font-size: 26px; color: #fff; margin-bottom: 20px; font-weight: bold; 
        background: linear-gradient(to bottom, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      }
      .custom-popup p { font-size: 13px; line-height: 1.6; opacity: 0.6; margin-bottom: 35px; }
      
      #allow-btn { 
        background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
        color: var(--navy); padding: 18px; border-radius: 12px; 
        font-weight: 900; cursor: pointer; text-transform: uppercase;
        letter-spacing: 2px; font-size: 14px; box-shadow: 0 10px 20px rgba(0,0,0,0.3);
      }

      /* 錄製按鈕 - 金色設計 */
      #rec-btn { 
        position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
        width: 75px; height: 75px; border-radius: 50%; border: 4px solid var(--gold);
        background: rgba(0, 12, 31, 0.6); backdrop-filter: blur(8px);
        display: none; align-items: center; justify-content: center; z-index: 1000;
      }
      #rec-btn::after { content: ""; width: 28px; height: 28px; background: #ff4444; border-radius: 50%; transition: all 0.3s; }
      #rec-btn.recording::after { border-radius: 6px; transform: scale(0.85); }

      /* 預覽視窗 - 品牌配色 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: var(--navy); z-index: 40000; 
        display: none; flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 280px; height: 497px; background: #000; 
        border: 2px solid var(--gold); border-radius: 20px; object-fit: cover; 
      }

      .popup-btns { display: flex; gap: 15px; margin-top: 25px; width: 280px; }
      .btn { flex: 1; padding: 16px; border-radius: 12px; font-weight: bold; font-family: sans-serif; cursor: pointer; text-align: center; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; }
      .save { background: var(--gold); color: var(--navy); text-decoration: none; }
      .close { border: 1px solid rgba(255,255,255,0.3); color: #fff; }

      #loading-text { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); color: var(--gold); font-family: sans-serif; display: none; z-index: 25000; letter-spacing: 5px; font-size: 10px; }
    </style>
  </head>

  <body>
    <!-- 品牌化權限彈窗 -->
    <div id="permission-overlay">
      <div class="custom-popup">
        <div class="brand-title">Kyrumi Studio</div>
        <div class="main-title">AR EXPERIENCE</div>
        <p>To view the immersive content, please enable camera and motion sensor access.</p>
        <div id="allow-btn">Enter Now</div>
      </div>
    </div>

    <div id="loading-text">INITIALIZING...</div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE VIDEO</a>
        </div>
    </div>

    <div id="rec-btn"></div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: false; precision: mediump; colorManagement: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const allowBtn = document.getElementById('allow-btn');
      const recBtn = document.getElementById('rec-btn');

      // 1. 修復變黑與權限啟動
      allowBtn.addEventListener('click', async () => {
        document.getElementById('permission-overlay').style.display = 'none';
        document.getElementById('loading-text').style.display = 'block';

        // 請求傳感器權限 (iOS)
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          try {
            await DeviceOrientationEvent.requestPermission();
          } catch (e) { console.error("Motion sensor error:", e); }
        }

        // 延遲啟動 A-Frame 系統，確保相機優先權
        setTimeout(() => {
          sceneEl.systems['mindar-image-system'].start();
        }, 300);
      });

      // AR 準備就緒後顯示按鈕並隱藏 Loading
      sceneEl.addEventListener("arReady", () => {
        document.getElementById('loading-text').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 2. 錄影引擎 (高幀率/低延遲優化)
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true });

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.clientWidth) {
            captureCanvas.width = arCanvas.clientWidth;
            captureCanvas.height = arCanvas.clientHeight;
          }
          ctx.drawImage(videoFeed, 0, 0, captureCanvas.width, captureCanvas.height);
          ctx.drawImage(arCanvas, 0, 0, captureCanvas.width, captureCanvas.height);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', () => {
        if (!isRecording) {
          isRecording = true;
          recBtn.classList.add('recording');
          chunks = [];
          recordLoop();
          
          const stream = captureCanvas.captureStream(30); 
          mediaRecorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: 2500000 
          });
          
          mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_AR_${Date.now()}.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          recBtn.classList.remove('recording');
          mediaRecorder.stop();
        }
      });

      // 關閉預覽
      document.getElementById('close-preview').onclick = () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      };

      // 定時修復：防止相機 video 標籤被 A-Frame 的 CSS 覆蓋
      setInterval(() => {
        const v = document.querySelector('video:not([id])');
        if (v) {
          v.style.setProperty('z-index', '-10', 'important');
          v.style.setProperty('width', '100vw', 'important');
          v.style.setProperty('height', '100vh', 'important');
          v.style.setProperty('object-fit', 'cover', 'important');
        }
      }, 1000);
      
      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());
      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
