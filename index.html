<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 核心：確保所有層級透明 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent !important; }
      
      /* 相機層：保持原始設定防止黑屏 */
      video {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        position: fixed !important;
        top: 0 !important;
        left: 0 !important;
        z-index: -5 !important; 
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }
      a-scene { background: transparent !important; }

      /* 日系藝術風格 REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; right: 30px; 
        width: 65px; height: 65px; border-radius: 50%; border: 1px solid #d4af37;
        background: rgba(13, 13, 13, 0.7); color: #d4af37;
        display: none; flex-direction: column; align-items: center; justify-content: center; 
        z-index: 1000; font-family: "serif", "Noto Serif JP", "MS Mincho", sans-serif; 
        cursor: pointer; transition: all 0.3s;
      }
      #rec-btn .rec-text { font-size: 10px; letter-spacing: 1px; font-weight: bold; }
      #rec-btn .jp-text { font-size: 8px; margin-top: 2px; opacity: 0.8; }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; background: rgba(0,0,0,0.9); }

      /* 預覽窗 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 2000; display: none;
        flex-direction: column; align-items: center; justify-content: center;
      }
      #preview-video { 
        width: 280px; height: 497px; 
        background: #000; border: 1px solid #d4af37; border-radius: 8px; 
        object-fit: cover; 
      }

      /* 日系風格彈窗按鈕 */
      .popup-btns { display: flex; gap: 0; margin-top: 25px; border: 1px solid #d4af37; border-radius: 4px; overflow: hidden; }
      .btn { 
        padding: 12px 30px; font-weight: normal; 
        font-family: "serif", sans-serif; text-decoration: none; cursor: pointer; font-size: 13px;
        letter-spacing: 2px; text-align: center; color: #d4af37;
      }
      .save { background: #d4af37; color: #000; border: none; }
      .close { background: transparent; color: #d4af37; border: none; border-right: 1px solid #d4af37; }

      /* 日系藝術進入畫面 */
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0d0d0d; z-index: 9999; display: flex; align-items: center; justify-content: center;
      }
      .jp-loading-card {
        padding: 50px 30px; border: 1px solid #d4af37; position: relative; text-align: center;
      }
      /* 和風四角飾線 */
      .jp-loading-card::before { content: ""; position: absolute; top: -5px; left: -5px; width: 15px; height: 15px; border-top: 2px solid #d4af37; border-left: 2px solid #d4af37; }
      .jp-loading-card::after { content: ""; position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; border-bottom: 2px solid #d4af37; border-right: 2px solid #d4af37; }
      
      .loading-title { color: #d4af37; font-family: "serif", sans-serif; letter-spacing: 5px; font-size: 22px; margin-bottom: 5px; }
      .loading-sub { color: #d4af37; font-size: 10px; letter-spacing: 2px; opacity: 0.7; font-family: "serif", sans-serif; margin-bottom: 30px; }

      /* 啟動按鈕 */
      #start-btn {
        background: transparent; border: 1px solid #d4af37; color: #d4af37;
        padding: 10px 30px; font-size: 12px; letter-spacing: 3px; cursor: pointer;
        font-family: "serif", sans-serif; transition: 0.3s;
      }
      #start-btn:active { background: #d4af37; color: #000; }
    </style>
  </head>

  <body>
    <!-- 日系啟動/Loading 畫面 -->
    <div id="loading-screen">
      <div class="jp-loading-card">
        <div class="loading-title">KYRUMI STUDIO</div>
        <div class="loading-sub">空間の記憶 | MEMORY OF SPACE</div>
        <button id="start-btn">進入探索 / ENTER</button>
      </div>
    </div>

    <!-- 預覽視窗 -->
    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">關閉 / CLOSE</div>
            <a id="download-link" class="btn save">保存 / SAVE</a>
        </div>
    </div>

    <!-- 錄影按鈕 -->
    <div id="rec-btn">
      <span class="rec-text">REC</span>
      <span class="jp-text">録画</span>
    </div>

    <!-- autoStart 改為 false，由 JS 觸發 -->
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded color-management="true" vr-mode-ui="enabled: false"
      renderer="preserveDrawingBuffer: true; alpha: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');
      const startBtn = document.getElementById('start-btn');

      // 核心修正：用戶點擊後才啟動 AR 與權限
      startBtn.addEventListener('click', () => {
        // 變更按鈕文字提示用戶正在載入
        startBtn.innerText = "起動中...";
        startBtn.disabled = true;

        // 啟動 MindAR
        sceneEl.systems['mindar-image-system'].start();
      });

      // 當 AR 準備好時隱藏啟動畫面
      window.addEventListener("arReady", () => {
        const loader = document.getElementById('loading-screen');
        loader.style.transition = "opacity 0.8s ease";
        loader.style.opacity = "0";
        setTimeout(() => { 
          loader.style.display = 'none'; 
          recBtn.style.display = 'flex'; // 啟動成功後才顯示 REC
        }, 800);
      });

      // 強制修正相機比例與黑邊
      setInterval(() => {
        const video = document.querySelector('video:not([id])');
        if (video) {
          video.style.setProperty('width', '100vw', 'important');
          video.style.setProperty('height', '100vh', 'important');
          video.style.setProperty('object-fit', 'cover', 'important');
          video.style.setProperty('z-index', '-5', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 錄影邏輯
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d');

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          captureCanvas.width = arCanvas.width;
          captureCanvas.height = arCanvas.height;
          
          const vw = videoFeed.videoWidth;
          const vh = videoFeed.videoHeight;
          const cw = captureCanvas.width;
          const ch = captureCanvas.height;
          const vRatio = vw / vh;
          const cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) {
            sw = vh * cRatio; sh = vh;
            sx = (vw - sw) / 2; sy = 0;
          } else {
            sw = vw; sh = vw / cRatio;
            sx = 0; sy = (vh - sh) / 2;
          }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = '<span class="rec-text">STOP</span><span class="jp-text">停止</span>';
          chunks = [];
          recordLoop();
          const stream = captureCanvas.captureStream(30);
          mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8' });
          mediaRecorder.ondataavailable = e => chunks.push(e.data);
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `KYRUMI_STUDIO_AR.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = '<span class="rec-text">REC</span><span class="jp-text">録画</span>';
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });

      // 觸發音頻播放權限
      window.addEventListener('touchstart', () => { 
        if(videoAsset.muted) videoAsset.muted = false; 
      }, {once: true});
    </script>
  </body>
</html>
