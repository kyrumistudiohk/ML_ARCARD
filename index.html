<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      /* 基礎設定 */
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
      
      /* 相機層 */
      video:not(#cardVideo):not(#preview-video) {
        width: 100vw !important; height: 100vh !important;
        object-fit: cover !important; position: fixed !important;
        top: 0 !important; left: 0 !important; z-index: -5 !important;
      }

      .a-canvas { background: transparent !important; z-index: -1 !important; }

      /* 自定義 Motion Sensor 權限 UI */
      #permission-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 10000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: #fff; font-family: sans-serif; text-align: center;
      }
      .perm-card { padding: 30px; border: 1px solid #d4af37; border-radius: 20px; width: 280px; }
      .perm-card h2 { color: #d4af37; letter-spacing: 2px; margin-bottom: 10px; }
      .perm-card p { font-size: 14px; opacity: 0.8; margin-bottom: 25px; line-height: 1.4; }
      #start-btn { 
        background: #d4af37; color: #000; padding: 12px 40px; 
        border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
      }

      /* REC 按鈕 */
      #rec-btn { 
        position: fixed; bottom: 40px; right: 30px; 
        width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff;
        background: rgba(0,0,0,0.4); color: #fff; font-weight: bold;
        display: none; align-items: center; justify-content: center; 
        z-index: 1000; font-family: sans-serif; cursor: pointer;
      }
      #rec-btn.recording { border-color: #ff4444; color: #ff4444; box-shadow: 0 0 15px #ff4444; }

      /* 預覽層 */
      #preview-layer {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 2000; display: none;
        flex-direction: column; align-items: center; justify-content: flex-end;
        padding-bottom: 60px;
      }
      #preview-video { 
        width: 250px; /* 縮小後的寬度 */
        height: 444px; /* 保持 9:16 */
        background: #000; border: 2px solid #d4af37; border-radius: 15px; 
        object-fit: cover; margin-bottom: 25px;
      }

      /* 預覽按鈕區 */
      .popup-btns { display: flex; gap: 15px; }
      .btn { 
        padding: 12px 30px; border-radius: 25px; font-weight: bold; 
        font-family: sans-serif; text-decoration: none; cursor: pointer; font-size: 14px;
      }
      .save { background: #d4af37; color: #000; }
      .close { border: 1px solid #fff; color: #fff; }

      #loading-screen { 
        position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; 
      }
      .loading-text { color: #d4af37; font-family: sans-serif; letter-spacing: 4px; font-weight: bold; }
    </style>
  </head>

  <body>
    <!-- 權限請求畫面 -->
    <div id="permission-overlay">
      <div class="perm-card">
        <h2>KYRUMI STUDIO</h2>
        <p>This experience requires motion sensors for better AR tracking stability.</p>
        <div id="start-btn">START AR</div>
      </div>
    </div>

    <div id="loading-screen"><div class="loading-text">LOADING...</div></div>

    <div id="preview-layer">
        <video id="preview-video" controls playsinline></video>
        <div class="popup-btns">
            <div id="close-preview" class="btn close">CLOSE</div>
            <a id="download-link" class="btn save">SAVE</a>
        </div>
    </div>

    <div id="rec-btn">REC</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no;"
      embedded vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: true"
      renderer="preserveDrawingBuffer: true; alpha: true; antialias: true; colorManagement: true;">
      
      <a-assets>
        <video id="cardVideo" src="./AR_SMK.mp4" loop="true" crossorigin="anonymous" webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-video src="#cardVideo" position="0 0.44 0" width="1" height="0.56"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const videoAsset = document.querySelector('#cardVideo');
      const recBtn = document.getElementById('rec-btn');

      // 1. 權限與啟動邏輯
      document.getElementById('start-btn').addEventListener('click', () => {
        document.getElementById('permission-overlay').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        
        // 請求 iOS 傳感器權限
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
          DeviceOrientationEvent.requestPermission().catch(console.error);
        }
        
        sceneEl.systems['mindar-image-system'].start();
      });

      window.addEventListener("arReady", () => {
        document.getElementById('loading-screen').style.display = 'none';
        recBtn.style.display = 'flex';
      });

      // 2. 自動修正全屏相機 (防止黑邊)
      setInterval(() => {
        const video = document.querySelector('video:not([id])');
        if (video) {
          video.style.setProperty('width', '100vw', 'important');
          video.style.setProperty('height', '100vh', 'important');
          video.style.setProperty('object-fit', 'cover', 'important');
          video.style.setProperty('z-index', '-5', 'important');
        }
      }, 1000);

      const targetEl = document.querySelector('#ar-target');
      targetEl.addEventListener("targetFound", () => videoAsset.play());
      targetEl.addEventListener("targetLost", () => videoAsset.pause());

      // 3. 錄影與防延遲邏輯
      let mediaRecorder, chunks = [], isRecording = false;
      const captureCanvas = document.createElement('canvas');
      const ctx = captureCanvas.getContext('2d', { desynchronized: true }); // 減少繪圖延遲

      function recordLoop() {
        if (!isRecording) return;
        const arCanvas = sceneEl.canvas;
        const videoFeed = document.querySelector('video:not([id])');
        
        if (videoFeed && arCanvas) {
          if (captureCanvas.width !== arCanvas.width) {
            captureCanvas.width = arCanvas.width;
            captureCanvas.height = arCanvas.height;
          }
          
          const cw = captureCanvas.width;
          const ch = captureCanvas.height;
          const vw = videoFeed.videoWidth;
          const vh = videoFeed.videoHeight;
          const vRatio = vw / vh;
          const cRatio = cw / ch;

          let sx, sy, sw, sh;
          if (vRatio > cRatio) {
            sw = vh * cRatio; sh = vh;
            sx = (vw - sw) / 2; sy = 0;
          } else {
            sw = vw; sh = vw / cRatio;
            sx = 0; sy = (vh - sh) / 2;
          }

          ctx.drawImage(videoFeed, sx, sy, sw, sh, 0, 0, cw, ch);
          ctx.drawImage(arCanvas, 0, 0, cw, ch);
        }
        requestAnimationFrame(recordLoop);
      }

      recBtn.addEventListener('click', function() {
        if (!isRecording) {
          isRecording = true;
          this.classList.add('recording');
          this.innerHTML = "STOP";
          chunks = [];
          recordLoop();

          const stream = captureCanvas.captureStream(30); // 鎖定 30fps 減輕負擔
          mediaRecorder = new MediaRecorder(stream, { 
            mimeType: 'video/webm;codecs=vp8',
            videoBitsPerSecond: 2500000 
          });
          
          mediaRecorder.ondataavailable = e => { if(e.data.size > 0) chunks.push(e.data); };
          mediaRecorder.onstop = () => {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const url = URL.createObjectURL(blob);
            document.getElementById('preview-video').src = url;
            document.getElementById('download-link').href = url;
            document.getElementById('download-link').download = `AR_KYRUMI_${Date.now()}.mp4`;
            document.getElementById('preview-layer').style.display = 'flex';
          };
          mediaRecorder.start();
        } else {
          isRecording = false;
          this.classList.remove('recording');
          this.innerHTML = "REC";
          mediaRecorder.stop();
        }
      });

      document.getElementById('close-preview').addEventListener('click', () => {
        document.getElementById('preview-layer').style.display = 'none';
        document.getElementById('preview-video').src = "";
      });
      
      // 點擊觸發聲音
      window.addEventListener('touchstart', () => { if(videoAsset.muted) videoAsset.muted = false; }, {once: true});
    </script>
  </body>
</html>
